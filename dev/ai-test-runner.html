<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forma AI Test Runner</title>
<style>
  :root{--blue:#1A9ED4;--ink:#0D1E2E;--muted:#5A7890;--border:#D9E8F2;--bg:#F5F8FB;--card:#fff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5}
  main{max-width:980px;margin:0 auto;padding:28px 18px 48px}
  h1{font-size:26px;margin:0 0 6px;letter-spacing:-.03em}
  .note{background:#FFF8E8;border:1px solid #F0D79A;color:#6C4D00;border-radius:10px;padding:10px 12px;font-size:13px;margin:14px 0 18px}
  .panel,.result{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 2px 12px rgba(13,30,46,.06)}
  .panel{padding:16px;margin-bottom:16px}
  .actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  button{border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;font-family:inherit}
  .primary{background:var(--blue);color:#fff}
  .secondary{background:#EAF4FB;color:#0E7BC4;border:1px solid #CBE3F4}
  .danger{background:#FFF1F1;color:#B83B32;border:1px solid #F0C5C1}
  button:disabled{opacity:.55;cursor:not-allowed}
  select{border:1px solid var(--border);border-radius:8px;padding:9px 10px;font:inherit;background:#fff;color:var(--ink);font-weight:700}
  .status{font-size:13px;color:var(--muted);margin-top:10px;min-height:20px}
  .run-options{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;font-size:13px;color:var(--muted)}
  .run-options input{width:84px;min-height:34px;margin:0}
  .questions{display:grid;gap:8px;margin-top:12px;font-size:13px;color:var(--muted)}
  .question-check{display:flex;align-items:flex-start;gap:8px;background:#F8FBFE;border:1px solid var(--border);border-radius:9px;padding:8px 10px}
  .question-check input{width:auto;min-height:0;margin:3px 0 0}
  .result{padding:16px;margin-bottom:14px}
  .q{font-size:15px;font-weight:800;margin-bottom:10px}
  .answer{white-space:pre-wrap;font-size:14px;border-left:3px solid var(--blue);padding:10px 12px;background:#F7FBFE;border-radius:0 8px 8px 0;color:#173047}
  .error{border-left-color:#D9534F;background:#FFF4F4;color:#8A2420}
  .meta{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:800;background:#EEF6FC;color:#0E7BC4;border:1px solid #CBE3F4}
  .pill.pass{background:#EAF8F1;color:#237A4F;border-color:#BFE9D0}
  .pill.fail{background:#FFF1F1;color:#B83B32;border-color:#F0C5C1}
  .pill.neutral{background:#F3F6F8;color:var(--muted);border-color:var(--border)}
  .checklist{display:grid;gap:6px;margin-top:12px}
  .check{display:flex;gap:8px;font-size:12px;padding:7px 9px;border-radius:8px;background:#F8FBFE;border:1px solid var(--border)}
  .check.pass{border-color:#BFE9D0;background:#F3FBF6}
  .check.fail{border-color:#F0C5C1;background:#FFF8F8}
  .rubric{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:8px;margin-top:12px}
  .metric{background:#F8FBFE;border:1px solid var(--border);border-radius:9px;padding:8px 9px}
  .metric b{display:block;font-size:16px;color:var(--ink)}
  .metric span{font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.04em;text-transform:uppercase}
  .compare{font-size:12px;color:var(--muted);background:#FAFCFE;border:1px solid var(--border);border-radius:9px;padding:8px 10px;margin-top:10px}
  details{margin-top:12px}
  summary{cursor:pointer;font-size:12px;font-weight:800;color:var(--blue)}
  .score{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:10px;margin-top:14px}
  label{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
  input,textarea{width:100%;margin-top:5px;border:1px solid var(--border);border-radius:8px;padding:8px 9px;font:inherit;background:#fff;color:var(--ink)}
  input{min-height:38px}
  textarea{min-height:74px;resize:vertical}
  .notes{grid-column:1/-1}
  .small{font-size:12px;color:var(--muted);margin-top:8px}
  @media(max-width:700px){.score,.rubric{grid-template-columns:1fr 1fr}main{padding:18px 12px 36px}}
</style>
</head>
<body>
<main>
  <h1>Forma AI Test Runner</h1>
  <div class="note">Dev-only AI test runner. Do not use for production UX.</div>

  <section class="panel">
    <div class="actions">
      <button id="run-quick-btn" class="primary">Run Quick Regression</button>
      <button id="run-deep-btn" class="secondary">Run Deep Evaluation</button>
      <button id="rerun-failed-btn" class="secondary" disabled>Rerun Failed</button>
      <button id="save-baseline-btn" class="secondary" disabled>Save Baseline</button>
      <button id="copy-btn" class="secondary" disabled>Copy Results</button>
      <button id="export-btn" class="secondary" disabled>Export JSON</button>
      <button id="clear-baseline-btn" class="danger" type="button">Clear Baselines</button>
    </div>
    <div class="run-options">
      <label>Suite<select id="suite-select"></select></label>
      <label>Delay seconds<input id="delay-input" type="number" min="0" max="60" value="1"></label>
      <button id="select-all-btn" class="secondary" type="button">Select All</button>
      <button id="select-none-btn" class="secondary" type="button">Select None</button>
    </div>
    <div id="status" class="status">Ready. Quick mode uses curated mock datasets for faster repeatable checks. Deep mode stores full responses and rubric details.</div>
    <div class="questions" id="questions"></div>
  </section>

  <section id="results"></section>
</main>

function spLbl(sp){return SPLIT_LBL[sp]||(sp?sp.charAt(0).toUpperCase()+sp.slice(1):'?');}
function cleanSplit(s){return String(s||'').trim().toLowerCase();}
function normalizeSplitsData(){
  const merged={};
  Object.keys(S.splitEx||{}).forEach(function(k){
    const ck=cleanSplit(k);
    if(!ck)return;
    merged[ck]=[...new Set([...(merged[ck]||[]),...((S.splitEx||{})[k]||[])])];
  });
  S.splitEx=Object.assign({},JSON.parse(JSON.stringify(DEF_EX)),merged);
  Object.keys(S.schedule||{}).forEach(function(d){S.schedule[d]=cleanSplit(S.schedule[d]);});
}
function isCardioSplit(sp){return CARDIO_SPLITS.includes((sp||'').toLowerCase());}
function isCardioEx(name){return!!(CARDIO_METRICS[name]);}
function cardioMetrics(name){return CARDIO_METRICS[name]||{m1:'MIN',m2:'DIST'};}

      expect('Gives hypotheses, not facts',/hypothesis|possib|may|might|could/i),

const results=[];
let lastRunIds=[];

function kg(lbs){return lbs/KG2LB;}
function ex(name,sets){return{name:name,sets:(sets||[]).map(function(s){return{w:kg(s[0]),r:s[1],warmup:!!s[2]};})};}
function workout(date,split,exercises){return{date:date+'T12:00:00.000Z',split:split,exercises:exercises||[]};}
function expect(text,includeAny,excludeAny,critical){return{text:text,includeAny:includeAny,excludeAny:excludeAny,critical:!!critical};}
function test(id,name,mode,dataset,conversation,prompt,expected_behavior){
  return{id:id,name:name,mode:mode,dataset:dataset,conversation:conversation||[],prompt:prompt,expected_behavior:expected_behavior||[]};
}

function readBaselines(){
  try{return JSON.parse(localStorage.getItem(BASELINE_KEY)||'{}')||{};}catch(e){return{};}
}
function writeBaselines(data){
  try{localStorage.setItem(BASELINE_KEY,JSON.stringify(data||{}));}catch(e){}
}

function resetFormaState(){
  S.view='home';S.workouts=[];S.schedule=Object.assign({},DEF_SCHED);S.scheduleHistory=[];
  S.splitEx=JSON.parse(JSON.stringify(DEF_EX));S.workout=null;S.lastWorkout=null;S.unit='lbs';
  S.messages=[];S.profile={name:'',goal:'',experience:'',session_duration:60,exercises_per_session:5,equipment:'',injuries:'',preferences:''};
  S.progressTab='calendar';S.selEx='';S.scoreDetail=null;S._scoreResults={};
}

function applyDataset(id,conversation){
  const ds=DATASETS[id]||DATASETS.new_user;
  resetFormaState();
  S.profile=Object.assign({},S.profile,ds.profile||{});
  S.schedule=Object.assign({},DEF_SCHED,ds.schedule||{});
  S.splitEx=Object.assign({},JSON.parse(JSON.stringify(DEF_EX)),ds.splitEx||{});
  S.workouts=(ds.workouts||[]).map(function(w){return Object.assign({},w,{exercises:(w.exercises||[]).map(function(e){return Object.assign({},e,{sets:Array.isArray(e.sets)?e.sets:[]});})});});
  S.messages=(conversation||[]).map(function(m){return{role:m.role==='ai'?'ai':'user',text:m.text||'',time:NOW(),actions:[]};});
  normalizeSplitsData();
  return ds;
}

function escapeHtml(value){
  return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function suiteTests(){
  const suite=document.getElementById('suite-select').value;
  if(suite==='quick')return TESTS.filter(function(t){return t.mode==='quick';});
  if(suite==='deep')return TESTS.slice();
  return TESTS.filter(function(t){return t.dataset===suite;});
}

function renderSuiteOptions(){
  const options=[
    ['quick','Quick Regression'],

function renderQuestionList(){

  }).join('');

function testById(id){return TESTS.find(function(t){return t.id===id;});}

function checkExpected(answer,item){
  const text=String(answer||'');
  let passed=true;
  if(item.includeAny instanceof RegExp)passed=passed&&item.includeAny.test(text);
  if(item.excludeAny instanceof RegExp)passed=passed&&!item.excludeAny.test(text);
  return passed;
}

function detectFailurePatterns(test,checks,answer){
  const failed=checks.filter(function(c){return !c.passed;}).map(function(c){return c.text.toLowerCase();}).join(' | ');
  const text=String(answer||'').toLowerCase();
  const labels=[];
  function add(label,cond){if(cond&&labels.indexOf(label)===-1)labels.push(label);}
  add('lost_conversation_context',/context|refers|confirmation|program-level/.test(failed));
  add('ignored_current_program',/current|structure|program/.test(failed));
  add('unnecessary_clarification',/ask|clarify|means again/.test(failed)||/can you clarify|what do you mean|do you mean/.test(text));
  add('confirmation_not_resolved',/confirmation|yes/.test(failed));
  add('jumped_to_workout_generation',/workout generation|full workout|exercise list/.test(failed));
  add('weak_program_reasoning',/program-level|schedule|structure/.test(failed));
  add('vague_program_action',/concrete day|schedule placement/.test(failed));
  add('unsupported_specific_muscle_claim',/confirmed gap|arms/.test(failed));
  add('overconfident_causation',/cause|caused|definitely|clearly/.test(failed)||/definitely|clearly caused/.test(text));
  add('over_attributed_to_sleep',/sleep/.test(failed)&&/sleep/.test(text));
  add('invented_data',/invent/.test(failed)||/you mentioned|your note says|injury|pain/.test(text)&&!/pain|injur|sleep/.test(JSON.stringify(test)));
  add('no_actionable_next_step',/next step|action|monitor|practical/.test(failed));
  add('generic_advice',/generic/.test(failed)||/in general|generally speaking/.test(text));
  add('failed_to_explain_reasoning',/reasoning|explains|evidence/.test(failed));
  return labels;
}

function scoreRubric(test,checks,patterns,answer){
  const total=checks.length||1;
  const passed=checks.filter(function(c){return c.passed;}).length;
  const ratio=passed/total;
  function clamp(n){return Math.max(1,Math.min(10,Math.round(n)));}
  const penalty=patterns.length;
  const base=clamp(4+ratio*6-penalty*.4);
  return{
    overall:base,
    contextUse:clamp(base-(patterns.includes('lost_conversation_context')?3:0)-(patterns.includes('confirmation_not_resolved')?2:0)),
    intentUnderstanding:clamp(base-(patterns.includes('unnecessary_clarification')?2:0)-(patterns.includes('jumped_to_workout_generation')?3:0)),
    programReasoning:clamp(base-(patterns.includes('weak_program_reasoning')?3:0)-(patterns.includes('ignored_current_program')?2:0)),
    evidenceDiscipline:clamp(base-(patterns.includes('overconfident_causation')?3:0)-(patterns.includes('over_attributed_to_sleep')?2:0)-(patterns.includes('unsupported_specific_muscle_claim')?2:0)),
    actionQuality:clamp(base-(patterns.includes('no_actionable_next_step')?3:0)-(patterns.includes('generic_advice')?2:0)-(patterns.includes('vague_program_action')?2:0)),
    conversationNaturalness:clamp(base-(patterns.includes('unnecessary_clarification')?2:0)-(patterns.includes('lost_conversation_context')?2:0)),
    noFabrication:clamp(10-(patterns.includes('invented_data')?6:0))
  };
}

function evaluateResponse(test,answer,error){
  const checks=(test.expected_behavior||[]).map(function(item){
    return{text:item.text,passed:!error&&checkExpected(answer,item),critical:item.critical};
  });
  const patterns=error?['api_or_runner_error']:detectFailurePatterns(test,checks,answer);
  const scores=error?Object.fromEntries(RUBRIC.map(function(k){return[k,1];})):scoreRubric(test,checks,patterns,answer);
  const failedCritical=checks.some(function(c){return c.critical&&!c.passed;});
  const pass=!error&&scores.overall>=7&&!failedCritical&&checks.filter(function(c){return !c.passed;}).length<=1;
  return{checks:checks,patterns:patterns,scores:scores,pass:pass};
}

function compareBaseline(result){
  const prior=readBaselines()[result.id];
  if(!prior)return null;
  const scoreDiff=result.evaluation.scores.overall-(prior.evaluation&&prior.evaluation.scores?prior.evaluation.scores.overall:0);
  const prevFailed=(prior.evaluation&&prior.evaluation.checks?prior.evaluation.checks:[]).filter(function(c){return !c.passed;}).length;
  const currFailed=result.evaluation.checks.filter(function(c){return !c.passed;}).length;
  return{
    previousScore:prior.evaluation&&prior.evaluation.scores?prior.evaluation.scores.overall:null,
    currentScore:result.evaluation.scores.overall,
    scoreDiff:scoreDiff,
    previousPass:!!(prior.evaluation&&prior.evaluation.pass),
    currentPass:result.evaluation.pass,
    failedDiff:currFailed-prevFailed,
    previousExcerpt:String(prior.answer||'').slice(0,260)
  };
}

function renderResult(index, result, mode){
  const el=document.createElement('article');
  el.className='result';
  el.dataset.index=String(index);
  const ev=result.evaluation;
  const failed=ev.checks.filter(function(c){return !c.passed;});
  const compare=result.comparison;
  el.innerHTML=
    '<div class="q">'+(index+1)+'. '+escapeHtml(result.name)+'</div>'+
    '<div class="meta">'+
      '<span class="pill '+(ev.pass?'pass':'fail')+'">'+(ev.pass?'PASS':'FAIL')+'</span>'+
      '<span class="pill neutral">Overall '+ev.scores.overall+'/10</span>'+
      '<span class="pill neutral">'+escapeHtml(result.datasetLabel)+'</span>'+
      (compare?'<span class="pill '+(compare.scoreDiff>=0?'pass':'fail')+'">'+(compare.scoreDiff>=0?'+':'')+compare.scoreDiff+' vs baseline</span>':'<span class="pill neutral">No baseline</span>')+
    '</div>'+
    '<div class="small"><strong>Prompt:</strong> '+escapeHtml(result.prompt)+'</div>'+
    '<div class="answer'+(result.error?' error':'')+'">'+escapeHtml(mode==='quick'?excerpt(result.answer,700):result.answer)+'</div>'+
    '<div class="rubric">'+RUBRIC.map(function(k){return '<div class="metric"><b>'+ev.scores[k]+'</b><span>'+escapeHtml(RUBRIC_LABELS[k])+'</span></div>';}).join('')+'</div>'+
    '<div class="checklist">'+ev.checks.map(function(c){
      return '<div class="check '+(c.passed?'pass':'fail')+'"><strong>'+(c.passed?'✓':'×')+'</strong><span>'+escapeHtml(c.text)+(c.critical?' <em>(critical)</em>':'')+'</span></div>';
    }).join('')+'</div>'+
    '<div class="compare"><strong>Failure patterns:</strong> '+(ev.patterns.length?ev.patterns.map(escapeHtml).join(', '):'none')+'<br>'+
      '<strong>Failed checklist:</strong> '+(failed.length?failed.map(function(c){return escapeHtml(c.text);}).join('; '):'none')+
      (compare?'<br><strong>Baseline:</strong> previous score '+compare.previousScore+', previous pass '+compare.previousPass+', failed item diff '+(compare.failedDiff>=0?'+':'')+compare.failedDiff:'')+
    '</div>'+
    (mode==='deep'?'<details open><summary>Full test context</summary><pre class="answer">'+escapeHtml(JSON.stringify({conversation:result.conversation,prompt:result.prompt,dataset:result.dataset},null,2))+'</pre></details>':'')+
    (compare?'<details><summary>Previous baseline response excerpt</summary><div class="answer">'+escapeHtml(compare.previousExcerpt)+'</div></details>':'')+
    '<div class="score">'+
      RUBRIC.map(function(k){return scoreInput(index,k,RUBRIC_LABELS[k]);}).join('')+
      '<label class="notes">Notes<textarea data-score="'+index+'" data-field="notes"></textarea></label>'+
    '</div>';
  document.getElementById('results').appendChild(el);
  RUBRIC.forEach(function(k){
    const input=el.querySelector('[data-field="'+k+'"]');
    if(input)input.value=String(ev.scores[k]);
  });
}

function scoreInput(index,field,label){
  return '<label>'+label+'<input type="number" min="1" max="10" data-score="'+index+'" data-field="'+field+'"></label>';
}

function excerpt(text,max){text=String(text||'');return text.length>max?text.slice(0,max-1)+'…':text;}

async function askAI(testCase){
  applyDataset(testCase.dataset,testCase.conversation);
  const question=testCase.prompt;
  const prior=(testCase.conversation||[]).map(function(m){
    return{role:m.role==='ai'?'assistant':'user',content:m.text||''};
  });
  const response=await fetch(API,{
    method:'POST',
    headers:apiHeaders(),
    body:JSON.stringify({
      model:MODEL,
      max_tokens:2500,
      thinking:{type:'enabled',budget_tokens:1024},
      system:buildSysPrompt(question)+'\n\nMODE: DEV AI RESPONSE TEST. Answer the user question normally, but keep the message concise and suitable for mobile chat. Do not include actions unless truly necessary.',
      messages:prior.concat([{role:'user',content:question}])
    })
  });
  const data=await response.json();
  if(data.error)throw new Error(data.error.message||'API error');
  const parsed=parseAIResponse(extractText(data.content));
  return parsed.message||extractText(data.content)||'(empty response)';
}

function wait(ms){return new Promise(function(resolve){setTimeout(resolve,ms);});}

function aiTesterSetupError(){
  const missing=[];
  if(typeof EX_DEFAULTS!=='object')missing.push('EX_DEFAULTS from ../js/utils.js');
  if(typeof getOverloadSuggestion!=='function')missing.push('getOverloadSuggestion from ../js/recommendations.js');
  if(typeof buildSysPrompt!=='function')missing.push('buildSysPrompt from ../js/ai.js');
  if(typeof parseAIResponse!=='function')missing.push('parseAIResponse from ../js/ai.js');
  if(!missing.length)return '';
  return 'AI tester setup error: missing '+missing.join(', ')+'. Check dev/ai-test-runner.html script imports before judging coaching quality.';
}

function selectedQuestions(){
  return Array.from(document.querySelectorAll('.question-toggle:checked')).map(function(input){
    return testById(input.dataset.testId);
  }).filter(Boolean);
}

async function runTests(mode,onlyTests){
  const setupError=aiTesterSetupError();
  if(setupError){
    document.getElementById('status').textContent=setupError;
    return;
  }
  if(!hasKey()){
    document.getElementById('status').textContent=aiKeyMessage();
    return;
  }
  const selected=onlyTests&&onlyTests.length?onlyTests:selectedQuestions();
  const delaySeconds=Math.max(0,Number(document.getElementById('delay-input').value)||0);
  const delayMs=delaySeconds*1000;
  if(!selected.length){
    document.getElementById('status').textContent='Select at least one question to run.';
    return;
  }
  results.length=0;
  document.getElementById('results').innerHTML='';
  document.getElementById('copy-btn').disabled=true;
  document.getElementById('run-quick-btn').disabled=true;
  document.getElementById('run-deep-btn').disabled=true;
  document.getElementById('rerun-failed-btn').disabled=true;
  const estimated=Math.max(0,(selected.length-1)*delaySeconds);
  document.getElementById('status').textContent='Running '+selected.length+' '+mode+' test'+(selected.length===1?'':'s')+'. Estimated pacing wait: '+estimated+'s.';
  for(let i=0;i<selected.length;i++){
    const item=selected[i];
    const ds=DATASETS[item.dataset]||{};
    document.getElementById('status').textContent='Running '+(i+1)+' of '+selected.length+(delaySeconds&&i<selected.length-1?' • next request waits '+delaySeconds+'s':'');
    try{
      const answer=await askAI(item);
      const evaluation=evaluateResponse(item,answer,null);
      const result={id:item.id,name:item.name,mode:mode,dataset:item.dataset,datasetLabel:ds.label||item.dataset,conversation:item.conversation,prompt:item.prompt,expected_behavior:item.expected_behavior.map(function(e){return e.text;}),answer:answer,error:null,evaluation:evaluation,ranAt:new Date().toISOString()};
      result.comparison=compareBaseline(result);
      results.push(result);
      renderResult(i,result,mode);
    }catch(err){
      const answer='Error: '+(err&&err.message?err.message:String(err));
      const evaluation=evaluateResponse(item,answer,answer);
      const result={id:item.id,name:item.name,mode:mode,dataset:item.dataset,datasetLabel:ds.label||item.dataset,conversation:item.conversation,prompt:item.prompt,expected_behavior:item.expected_behavior.map(function(e){return e.text;}),answer:answer,error:answer,evaluation:evaluation,ranAt:new Date().toISOString()};
      result.comparison=compareBaseline(result);
      results.push(result);
      renderResult(i,result,mode);
    }
    if(delayMs&&i<selected.length-1){
      document.getElementById('status').textContent='Completed '+(i+1)+' of '+selected.length+'. Waiting '+delaySeconds+'s before the next request.';
      await wait(delayMs);
    }
  }
  lastRunIds=results.map(function(r){return r.id;});
  try{localStorage.setItem(RESULTS_KEY,JSON.stringify(results));}catch(e){}
  const failed=results.filter(function(r){return !r.evaluation.pass;}).length;
  document.getElementById('status').textContent='Done. '+results.length+' results generated. Failed: '+failed+'.';
  document.getElementById('copy-btn').disabled=false;
  document.getElementById('export-btn').disabled=false;
  document.getElementById('save-baseline-btn').disabled=false;
  document.getElementById('rerun-failed-btn').disabled=failed===0;
  document.getElementById('run-quick-btn').disabled=false;
  document.getElementById('run-deep-btn').disabled=false;
}

function buildMarkdownResults(){
  return '# Forma AI Tester Results\n\nGenerated: '+new Date().toISOString()+'\n\n'+results.map(function(r,i){
    const fields={};
    document.querySelectorAll('[data-score="'+i+'"]').forEach(function(input){
      fields[input.dataset.field]=input.value.trim();
    });
    let md='## '+(i+1)+'. '+r.name+'\n';
    md+='- Test ID: '+r.id+'\n- Mode: '+r.mode+'\n- Dataset: '+r.datasetLabel+'\n- Pass: '+r.evaluation.pass+'\n- Overall: '+(fields.overall||r.evaluation.scores.overall)+'/10\n';
    md+='- Failure patterns: '+(r.evaluation.patterns.join(', ')||'none')+'\n';
    if(r.comparison)md+='- Baseline comparison: '+(r.comparison.scoreDiff>=0?'+':'')+r.comparison.scoreDiff+' score, pass '+r.comparison.previousPass+' -> '+r.comparison.currentPass+'\n';
    md+='\n### Prompt\n'+r.prompt+'\n';
    md+='\n### Conversation\n'+(r.conversation.length?r.conversation.map(function(m){return '- '+m.role+': '+m.text;}).join('\n'):'none')+'\n';
    md+='\n### AI Response\n'+r.answer+'\n';
    md+='\n### Checklist\n'+r.evaluation.checks.map(function(c){return '- '+(c.passed?'PASS':'FAIL')+': '+c.text;}).join('\n')+'\n';
    md+='\n### Scores\n';
    RUBRIC.forEach(function(k){md+='- '+RUBRIC_LABELS[k]+': '+(fields[k]||r.evaluation.scores[k])+'\n';});
    md+='- Notes: '+(fields.notes||'')+'\n';
    return md;
  }).join('\n---\n\n');
}

async function copyResults(){
  const md=buildMarkdownResults();
  try{
    await navigator.clipboard.writeText(md);
    document.getElementById('status').textContent='Copied results to clipboard.';
  }catch(e){
    const ta=document.createElement('textarea');
    ta.value=md;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    document.getElementById('status').textContent='Copied results to clipboard.';
  }
}

function saveBaseline(){
  const baselines=readBaselines();
  results.forEach(function(r){baselines[r.id]=r;});
  writeBaselines(baselines);
  document.getElementById('status').textContent='Saved '+results.length+' current result'+(results.length===1?'':'s')+' as baselines.';
}

function clearBaselines(){
  if(!confirm('Clear all AI tester baselines?'))return;
  writeBaselines({});
  document.getElementById('status').textContent='Baselines cleared.';
}

function exportJson(){
  const blob=new Blob([JSON.stringify(results,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='forma-ai-test-results-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function rerunFailed(){
  const failed=results.filter(function(r){return !r.evaluation.pass;}).map(function(r){return testById(r.id);}).filter(Boolean);
  if(!failed.length)return;
  runTests('quick-rerun',failed);
}

function updateForSuite(){renderQuestionList();}

renderSuiteOptions();
renderQuestionList();
document.getElementById('suite-select').addEventListener('change',updateForSuite);

});
document.getElementById('run-deep-btn').addEventListener('click',function(){

});
document.getElementById('rerun-failed-btn').addEventListener('click',rerunFailed);
document.getElementById('save-baseline-btn').addEventListener('click',saveBaseline);
document.getElementById('clear-baseline-btn').addEventListener('click',clearBaselines);
document.getElementById('copy-btn').addEventListener('click',copyResults);
document.getElementById('export-btn').addEventListener('click',exportJson);
document.getElementById('select-all-btn').addEventListener('click',function(){
  document.querySelectorAll('.question-toggle').forEach(function(input){input.checked=true;});
});
document.getElementById('select-none-btn').addEventListener('click',function(){

});

if(autoMode==='quick'||autoMode==='deep'){
  document.getElementById('suite-select').value=autoMode;
  renderQuestionList();
  setTimeout(function(){runTests(autoMode);},300);
}
