var _sheetDrag={el:null,startY:0,dy:0,active:false};
function sheetTouchStart(e){
  if(!e.touches||!e.touches.length)return;
  _sheetDrag={el:e.currentTarget,startY:e.touches[0].clientY,dy:0,active:false};
}
function sheetTouchMove(e){
  if(!_sheetDrag.el||!e.touches||!e.touches.length)return;
  const sc=_sheetDrag.el.querySelector('[data-sheet-scroll]');
  const atTop=!sc||sc.scrollTop<=0;
  const dy=e.touches[0].clientY-_sheetDrag.startY;
  _sheetDrag.dy=dy;
  if(dy>0&&atTop){
    _sheetDrag.active=true;
    _sheetDrag.el.style.transition='none';
    _sheetDrag.el.style.transform='translateY('+Math.min(dy,180)+'px)';
    e.preventDefault();
  }
}
function sheetTouchEnd(kind){
  const d=_sheetDrag;
  if(!d.el)return;
  if(d.active&&d.dy>90){
    closeSheet(kind);
  }else{
    d.el.style.transition='transform .18s ease';
    d.el.style.transform='translateY(0)';
  }
  _sheetDrag={el:null,startY:0,dy:0,active:false};
}
function closeSheet(kind){
  if(kind==='dayPreview')S.dayPreviewPanel=null;
  else if(kind==='exHistory')S.exHistoryPanel=null;
  else if(kind==='exInstruct'){S.exInstructPanel=null;S.exInstructText=null;S.exInstructChat=[];}
  else if(kind==='scoreDetail')S.scoreDetail=null;
  render();
}

function pill(sp){

}

function flushLogInputs(){
  if(!S.workout)return;
  S.workout.exercises.forEach((ex,i)=>{

    if(wi)ex.inputW=wi.value;

}

function homeGreeting(){
  const h=new Date().getHours();
  const name=(S.profile.name||'').trim().split(/\s+/)[0];
  const part=h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  return part+(name?', '+escH(name):'');
}

function homeRecommendationLine(sug){
  if(!sug)return '';
  const unit=uLbl();
  const wt=sug.weightDisp!==undefined&&sug.weightDisp!==null?String(sug.weightDisp)+' '+unit:null;
  if(sug.action==='add_weight'||sug.action==='early_add_weight')return wt?'Increase to '+wt:'Add weight';
  if(sug.action==='add_reps'||sug.action==='early_add_reps')return wt?'Stay at '+wt:'Add reps';
  if(sug.action==='early_repeat')return wt?'Repeat '+wt:'Repeat last working set';
  if(sug.action==='baseline')return wt?'Start around '+wt:'Set a baseline';
  if(sug.action==='hold'&&wt)return 'Hold '+wt;
  if(sug.action==='reduce_weight'&&wt)return 'Reduce to '+wt;
  if(sug.action==='reduce_or_recover')return 'Hold progression today';
  const text=typeof recommendationActionText==='function'?recommendationActionText(sug):String(sug.detail||sug.reason||'').replace(/<br>/g,' ');
  return text.replace(/\s+and aiming for .*/i,'');
}

function homePlanItems(exs){
  return (exs||[]).map(function(name){
    const current=S.workout&&S.workout.exercises?(S.workout.exercises.find(function(e){return e.name===name;})||{}).inputW:null;
    const sug=typeof getOverloadSuggestion==='function'?getOverloadSuggestion(name,current):null;
    if(!sug)return null;
    const action=homeRecommendationLine(sug)
      .replace(/^Stay at /,'stay at ')
      .replace(/^Increase to /,'increase to ')
      .replace(/^Repeat /,'repeat ')
      .replace(/^Start around /,'start around ')
      .replace(/^Hold /,'hold ')
      .replace(/^Reduce to /,'reduce to ');
    const short=(sug.action==='add_reps'||sug.action==='early_add_reps')&&sug.repTarget?'aim for '+sug.repTarget+' reps':action;
    return{
      name:name,
      text:name+': '+short,
      score:sug.confidence==='high'?3:sug.confidence==='medium'?2:1
    };
  }).filter(Boolean).sort(function(a,b){return b.score-a.score;}).slice(0,3);
}

// ── PAST WORKOUT EDITING ──────────────────────────────────────
function pastSave(){persist('ll_workouts',S.workouts);}

function savePastDate(val){
  if(!val||S.selWorkout===null)return;
  // Keep original time, just change date
  const orig=new Date(S.workouts[S.selWorkout].date);
  const nd=new Date(val+'T'+orig.toTimeString().slice(0,8));
  S.workouts[S.selWorkout].date=nd.toISOString();
  pastSave();render();
}

function pastSplitOptions(current){
  const names=[...SPLITS];
  Object.values(S.schedule||{}).forEach(function(sp){sp=cleanSplit(sp);if(sp&&!names.includes(sp))names.push(sp);});
  Object.keys(S.splitEx||{}).forEach(function(sp){sp=cleanSplit(sp);if(sp&&!names.includes(sp))names.push(sp);});
  current=cleanSplit(current);
  if(current&&!names.includes(current))names.unshift(current);
  return names;
}

function savePastSplit(val){
  if(!val||S.selWorkout===null||!S.workouts[S.selWorkout])return;
  S.workouts[S.selWorkout].split=cleanSplit(val);
  pastSave();render();
}

function deleteWorkout(){
  if(!confirm('Delete this workout permanently?'))return;
  S.workouts.splice(S.selWorkout,1);
  persist('ll_workouts',S.workouts);
  S.selWorkout=null;S.editPastMode=false;
  go('progress');
}

function savePastSet(ei,si){
  const w=S.workouts[S.selWorkout];
  const s=w.exercises[ei].sets[si];
  const isCardio=isCardioEx(w.exercises[ei].name);
  const wi=document.getElementById('psi-w-'+ei+'-'+si);
  const ri=document.getElementById('psi-r-'+ei+'-'+si);
  if(wi)s.w=isCardio?parseFloat(wi.value):toKg(parseFloat(wi.value)||0);
  if(ri&&!isCardio)s.r=parseInt(ri.value)||0;
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function deletePastSet(ei,si){
  S.workouts[S.selWorkout].exercises[ei].sets.splice(si,1);
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function togglePastWarmup(ei,si){
  const s=S.workouts[S.selWorkout].exercises[ei].sets[si];
  s.warmup=!s.warmup;
  pastSave();render();
}
function addPastSet(ei){
  const w=S.workouts[S.selWorkout];
  const ex=w.exercises[ei];
  const isCardio=isCardioEx(ex.name);
  const wi=document.getElementById('new-w-'+ei);
  const ri=document.getElementById('new-r-'+ei);
  const dW=parseFloat(wi?wi.value:0)||0;
  const r=parseInt(ri?ri.value:0)||0;
  if(!dW)return;
  ex.sets.push({w:isCardio?dW:toKg(dW),r:isCardio?0:r});
  S.editPastAddingEx=null;
  pastSave();render();
}
function deletePastExercise(ei){
  S.workouts[S.selWorkout].exercises.splice(ei,1);
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function savePastExName(ei){
  const inp=document.getElementById('past-ex-name-'+ei);
  const name=canonicalExerciseName(inp?inp.value.trim():'');
  if(!name)return;
  S.workouts[S.selWorkout].exercises[ei].name=name;
  S.editPastExIdx=null;
  pastSave();render();
}
function addPastExercise(){
  const inp=document.getElementById('past-new-ex');
  const name=canonicalExerciseName(inp?inp.value.trim():'');
  if(!name)return;
  S.workouts[S.selWorkout].exercises.push(makeWorkoutExercise(name));
  if(inp)inp.value='';
  pastSave();render();
}

  const inp=document.getElementById('psi-w-'+ei+'-'+si);

}
function nudgePastNewR(ei,delta){

function _selPref(field,val,label){

function updateProfile(field, val){
  S.profile[field]=val;
  persist('ll_profile', S.profile);
  render();
}
// Save profile field without triggering a full re-render — used by oninput
// so the keyboard doesn't dismiss on every keystroke
function saveProfileSilent(field, val){
  S.profile[field]=val;
  persist('ll_profile', S.profile);
}

    '<div style="font-size:11px;color:var(--muted);margin-top:8px">'+(isDark?'Using Forma dark mode':'Using Forma light mode')+'</div>'+
  '</div>';
  const unitCard='<div class="card" style="margin-top:18px">'+
    '<span class="lbl" style="margin-bottom:12px">WEIGHT UNIT</span>'+
    '<div style="display:flex;background:var(--input-bg);border:1px solid var(--border);border-radius:9px;overflow:hidden">'+
      '<button class="press" onclick="setUnit(\'kg\')" style="flex:1;padding:11px;font-size:13px;font-weight:'+(isKg?800:400)+';background:'+(isKg?'var(--blue)':'none')+';color:'+(isKg?'#fff':'var(--sub)')+';border:none;cursor:pointer;font-family:inherit">kg</button>'+
      '<button class="press" onclick="setUnit(\'lbs\')" style="flex:1;padding:11px;font-size:13px;font-weight:'+(!isKg?800:400)+';background:'+(!isKg?'var(--blue)':'none')+';color:'+(!isKg?'#fff':'var(--sub)')+';border:none;border-left:1px solid var(--border);cursor:pointer;font-family:inherit">lbs</button>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-top:8px">'+(isKg?'Showing weights in kilograms':'Showing weights in pounds &mdash; stored as kg')+'</div>'+
  '</div>';

  const proxyReady=typeof aiProxyConfigured==='function'&&aiProxyConfigured();
  const hasOldKey=!!localStorage.getItem('ll_apikey');
  const apiCard='<div class="card" style="margin-top:14px">'+
    '<span class="lbl" style="margin-bottom:8px">AI Connection</span>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
      '<span style="width:8px;height:8px;border-radius:50%;background:'+(proxyReady?'#2DAA70':'#E8A33A')+';box-shadow:0 0 0 4px '+(proxyReady?'rgba(45,170,112,.12)':'rgba(232,163,58,.12)')+'"></span>'+
      '<div style="font-size:13px;font-weight:800;color:var(--white)">'+(proxyReady?'Connected through Forma proxy':'Proxy setup needed')+'</div>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:'+(hasOldKey?'10px':'0')+'">Anthropic API keys are stored only as encrypted Cloudflare Worker secrets. They are not saved in this browser or included in backups.</div>'+
    (hasOldKey?'<button class="press" onclick="clearApiKey()" style="background:var(--s2);border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:8px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Remove old browser key</button>':'')+
    '<div id="key-err" style="color:#E05050;font-size:11px;margin-top:7px;min-height:14px"></div>'+
  '</div>';

  const acct=S.auth&&S.auth.user?S.auth.user:null;
  const accountCard=acct?'<div class="card" style="margin-top:14px">'+
    '<span class="lbl" style="margin-bottom:8px">Account</span>'+
    '<div style="font-size:13px;font-weight:800;color:var(--white);margin-bottom:4px">'+escH(acct.email||'Signed in')+'</div>'+
    '<div style="font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:10px">Your Forma data is saved to this Supabase account.</div>'+
    '<button class="press" onclick="formaSignOut()" style="background:var(--s2);border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:8px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Sign out</button>'+
  '</div>':'';

  const tourCard='<div class="card" style="margin-top:14px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px">'+
      '<div>'+
        '<div style="font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px">Feature Tour</div>'+
        '<div style="font-size:11px;color:var(--muted);line-height:1.4">Preview Forma with temporary demo data.</div>'+
      '</div>'+
      '<button class="press" onclick="replayFeatureTour()" style="background:var(--s2);border:1px solid var(--border2);color:var(--blue);border-radius:9px;padding:9px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap">Replay feature tour</button>'+
    '</div>'+
  '</div>';

  const backupCard=
    '<div class="card" style="margin-top:14px">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
        '<div style="width:36px;height:36px;background:var(--s2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
          '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'+
        '</div>'+
        '<div>'+
          '<div style="font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px">Data Backup</div>'+
          '<div style="font-size:11px;color:var(--muted);line-height:1.4">Includes workouts, schedule, exercises, profile &amp; personalization</div>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:6px">'+
        '<button class="press" onclick="exportData()" style="flex:1;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Export</button>'+
        '<button class="press" onclick="document.getElementById(\'import-file\').click()" style="flex:1;background:var(--s1);color:var(--white);border:1px solid var(--border);border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Import</button>'+
      '</div>'+
      '<input id="import-file" type="file" accept=".json" style="display:none" onchange="importData(this)">'+
      '<div id="import-status" style="font-size:11px;min-height:14px;color:'+(S.importStatus&&S.importStatus.color?S.importStatus.color:'var(--blue)')+'">'+(S.importStatus?escH(S.importStatus.text):'')+'</div>'+
    '</div>';

  const dangerCard=
    '<div class="card" style="margin-top:14px;border:1px solid #FCCECE">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
        '<div style="width:36px;height:36px;background:#FEE8E8;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C44" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>'+
        '</div>'+
        '<div>'+
          '<div style="font-size:13px;font-weight:700;color:#C44;margin-bottom:2px">Delete All Data</div>'+
          '<div style="font-size:11px;color:var(--muted);line-height:1.4">Permanently removes all workouts and profile data. Cannot be undone.</div>'+
        '</div>'+
      '</div>'+
      '<button onclick="deleteAllData()" style="width:100%;background:#FEE8E8;border:1px solid #FCCECE;color:#C44;border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Delete Everything</button>'+
    '</div>';

  return '<div class="stabs">'+tabs+'</div>'+body+unitCard+appearanceCard+apiCard+accountCard+tourCard+backupCard+dangerCard;
}




// Progress
function selEx(name){
  if(S.chartAnalysisEx!==name){S.chartAnalysis=null;S.chartAnalysisLoading=false;}
  S.selEx=name;render();setTimeout(drawChart,0);
}



// Setup
function setDay(day,sp){S.schedule[day]=sp;persist('ll_schedule',S.schedule);render();}
function setCustomDay(day){
  const inp=document.getElementById('custom-'+day);
  const val=inp?inp.value.trim().toLowerCase().replace(/\s+/g,'-'):'';
  if(!val)return;
  if(!S.splitEx[val]){S.splitEx[val]=DEF_EX[val]||[];persist('ll_splits',S.splitEx);}
  S.schedule[day]=val;persist('ll_schedule',S.schedule);render();
}
function setSetupTab(t){S.setupTab=t;render();}
function setEditSplit(s){S.editSplit=s;render();}
function addSplitEx(){
  const inp=document.getElementById('nex');if(!inp||!inp.value.trim())return;
  if(!S.splitEx[S.editSplit])S.splitEx[S.editSplit]=[];
  S.splitEx[S.editSplit].push(inp.value.trim());
  persist('ll_splits',S.splitEx);render();
}
function removeSplitEx(split,idx){S.splitEx[split].splice(idx,1);persist('ll_splits',S.splitEx);render();}
function setUnit(u){
  S.unit=u;persist('ll_unit',u);
  if(S.workout)S.workout.exercises.forEach(function(ex){
    if(ex.sets&&ex.sets.length)return;
    const defaults=exerciseInputDefaults(ex.name);
    ex.inputW=defaults.inputW;
    ex.inputR=defaults.inputR;
    ex.nextIsWarmup=defaults.nextIsWarmup;
  });
  render();
}
function applyTheme(t){
  const theme=t==='dark'?'dark':'light';
  S.theme=theme;
  document.documentElement.setAttribute('data-theme',theme);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute('content',theme==='dark'?'#111820':'#0E7BC4');
}
function setTheme(t){
  const theme=t==='dark'?'dark':'light';
  try{localStorage.setItem('forma_theme',theme);}catch(e){}
  applyTheme(theme);
  render();
}
