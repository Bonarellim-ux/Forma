const SPLIT_COL={push:'#E8693A',pull:'#1A9ED4',legs:'#2DAA70',upper:'#7B6FE0',lower:'#D4A020',rest:'#9AB8CC'};
const CUSTOM_COLS=['#E84393','#00BFA5','#FF6F00','#5C6BC0','#26A69A','#EF5350','#8D6E63','#42A5F5'];
function spLbl(sp){return SPLIT_LBL[sp]||(sp?sp.charAt(0).toUpperCase()+sp.slice(1):'?');}
function spCol(sp){
  if(SPLIT_COL[sp])return SPLIT_COL[sp];
  let h=0;for(let i=0;i<sp.length;i++)h=(h*31+sp.charCodeAt(i))&0xffffffff;
  return CUSTOM_COLS[Math.abs(h)%CUSTOM_COLS.length];
}
function cleanSplit(s){return String(s||'').trim().toLowerCase();}
function normalizeSplitsData(){
  // Merge old saved split names like "Push"/"Pull" into canonical lowercase keys
  const merged={};
  Object.keys(S.splitEx||{}).forEach(function(k){
    const ck=cleanSplit(k);
    if(!ck)return;
    merged[ck]=[...new Set([...(merged[ck]||[]),...((S.splitEx||{})[k]||[])])];
  });
  S.splitEx=Object.assign({},JSON.parse(JSON.stringify(DEF_EX)),merged);
  Object.keys(S.schedule||{}).forEach(function(d){S.schedule[d]=cleanSplit(S.schedule[d]);});
}
function allSplits(){
  const inSched=Object.values(S.schedule||{}).map(cleanSplit);
  const inEx=Object.keys(S.splitEx||{}).map(cleanSplit);
  return[...new Set([...SPLITS.map(cleanSplit),...inSched,...inEx])].filter(Boolean);
}

function getExerciseSubstitutions(name){
  if(S&&S.tourActive&&name==='Bulgarian Split Squat')return[
    makeSub('Reverse Lunge','quads/glutes','unilateral squat','Same unilateral squat pattern, same quad/glute target, and easier to load when balance is limiting.'),
    makeSub('Step-Up','quads/glutes','unilateral squat','Same single-leg role with a stable box height and similar knee/hip action.'),
    makeSub('Split Squat','quads/glutes','unilateral squat','Same lower-body pattern with less balance demand than the rear-foot-elevated version.')
  ];

══════════════════════════════════════════════
• Slow eccentric (3–5s down): +hypertrophy stimulus, good for plateaus (Schoenfeld 2015)
• Pause at bottom: increases time under tension + eliminates stretch reflex
• 1.5 rep method: go down, halfway up, back down, full up — doubles TUT per set
• Cluster sets: rest 15s mid-set to push past failure — advanced technique
• Mechanical drop set: change leverage (e.g. incline → flat → decline) without dropping weight

══════════════════════════════════════════════

══════════════════════════════════════════════
• Linear progression: add weight each session — best for beginners
• Undulating periodization: vary rep ranges week to week (e.g. 5s → 8s → 12s) — intermediate+
• Block periodization: 3–4 week hypertrophy block → 3–4 week strength block → deload
• Deload: every 4–8 weeks, reduce volume 40–50% — prevents overreaching
• Progressive overload: add weight, reps, sets, or reduce rest time — ALWAYS the goal

• After chest: add tricep isolation (Pushdown, Skull Crusher)
• After back: add bicep isolation (Curl, Hammer Curl)
• Rear delts almost always undertrained — Face Pull or Reverse Fly fits almost every session

★★★ Strong RCT/meta-analysis, widely replicated
★★☆ Good EMG evidence + practical consensus  
★☆☆ Mechanistic reasoning, limited direct studies

function sheetTouchStart(e){
  if(!e.touches||!e.touches.length)return;
  _sheetDrag={el:e.currentTarget,startY:e.touches[0].clientY,dy:0,active:false};
}
function sheetTouchMove(e){
  if(!_sheetDrag.el||!e.touches||!e.touches.length)return;
  const sc=_sheetDrag.el.querySelector('[data-sheet-scroll]');
  const atTop=!sc||sc.scrollTop<=0;
  const dy=e.touches[0].clientY-_sheetDrag.startY;
  _sheetDrag.dy=dy;
  if(dy>0&&atTop){
    _sheetDrag.active=true;
    _sheetDrag.el.style.transition='none';
    _sheetDrag.el.style.transform='translateY('+Math.min(dy,180)+'px)';
    e.preventDefault();
  }
}
function sheetTouchEnd(kind){
  const d=_sheetDrag;
  if(!d.el)return;
  if(d.active&&d.dy>90){
    closeSheet(kind);
  }else{
    d.el.style.transition='transform .18s ease';
    d.el.style.transform='translateY(0)';
  }
  _sheetDrag={el:null,startY:0,dy:0,active:false};
}

// Compute overload suggestion: returns {dir:'up'|'down', weight (kg), weightDisp, reason, detail} or null
function getOverloadSuggestion(exName,currentInputW){
  const ws=getLastWorkingSets(exName);
  if(!ws||ws.length<2)return null;
  if(ws.some(s=>s.w===0))return null; // skip BW

  const name=exName.toLowerCase();
  const machine=['machine','cable','pulldown','leg curl','leg extension','calf raise','face pull','lateral raise','pushdown','chest fly','hammer curl','dumbbell curl','incline hammer'];
  const compound=['squat','deadlift','bench press','barbell row','overhead press','hack squat','leg press','hip thrust','romanian deadlift','barbell'];
  const isMachine=machine.some(m=>name.includes(m));
  const isCompound=compound.some(c=>name.includes(c));

  // Work in DISPLAY units throughout, then convert back to kg for storage
  const dispW=s=>toDisp(s.w); // convert stored kg → display unit
  const roundToDisp=5; // always 5 in display unit (lbs or kg)
  const roundD=v=>Math.round(v/roundToDisp)*roundToDisp;

  // Find mode weight in display units
  const counts={};
  ws.forEach(s=>{const d=roundD(dispW(s)); counts[d]=(counts[d]||0)+1;});
  const lastWDisp=Number(Object.keys(counts).reduce((a,b)=>counts[a]>=counts[b]?a:b));

  const avgReps=ws.reduce((a,s)=>a+s.r,0)/ws.length;
  const minReps=Math.min.apply(null,ws.map(s=>s.r));
  const maxReps=Math.max.apply(null,ws.map(s=>s.r));
  const repRange=maxReps-minReps;

  // Count sessions at roughly this weight
  const sessionsAtWeight=S.workouts.filter(w=>{
    const ex=w.exercises&&w.exercises.find(e=>e&&e.name===exName);
    if(!ex||!Array.isArray(ex.sets))return false;
    try{
      const wk=ex.sets.filter(s=>s&&!s.warmup&&s.r>0);
      return wk.length>0&&Math.abs(roundD(dispW(wk[0]))-lastWDisp)<=roundToDisp;
    }catch(e){return false;}
  }).length;

  const suggestUp=avgReps>=8&&repRange<=3&&sessionsAtWeight>=2;
  const suggestDown=minReps<=4&&avgReps<=5;

  if(!suggestUp&&!suggestDown)return null;

  if(suggestUp){
    const sugDisp=roundD(lastWDisp+roundToDisp);
    const sugKg=S.unit==='lbs'?sugDisp/KG2LB:sugDisp;
    const currentDisp=parseFloat(currentInputW)>0?toDisp(parseFloat(currentInputW)):lastWDisp;
    if(Math.abs(sugDisp-currentDisp)>0.5){
      const detail='You averaged '+Math.round(avgReps)+' reps at '+lastWDisp+' '+uLbl()+' across '+sessionsAtWeight+' session'+(sessionsAtWeight!==1?'s':'')+'. '+(S&&S.tourActive?'I’d recommend adding ':'Add ')+roundToDisp+' '+uLbl()+'.';
      return{dir:'up',weight:sugKg,weightDisp:sugDisp,reason:'Ready to go heavier',detail};
    }
  }
  if(suggestDown){
    const sugDisp=roundD(lastWDisp-roundToDisp);
    const sugKg=S.unit==='lbs'?sugDisp/KG2LB:sugDisp;
    if(sugDisp>0){
      const detail='You averaged only '+Math.round(avgReps)+' reps at '+lastWDisp+' '+uLbl()+' last session. Drop '+roundToDisp+' '+uLbl()+' to hit your target rep range.';
      return{dir:'down',weight:sugKg,weightDisp:sugDisp,reason:'Too heavy — drop slightly',detail};
    }

}

function getAutoRestSecs(exName){
  const n=(exName||'').toLowerCase();
  const heavy=['squat','deadlift','bench press','barbell row','overhead press','hack squat','leg press','hip thrust','romanian deadlift','pull-up','weighted'];
  const moderate=['incline','lat pulldown','seated row','machine row','cable row','dumbbell press','shoulder press','incline bench'];
  if(heavy.some(function(k){return n.includes(k);})) return 120;   // 2 min — heavy compounds
  if(moderate.some(function(k){return n.includes(k);})) return 90;  // 90s — moderate compounds
  return 60;                                                          // 60s — isolation

// ── NOTIFICATIONS ─────────────────────────────────────────────
function requestNotifPermission(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default')Notification.requestPermission();
}

function fireRestDoneNotif(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  let nextEx='Next set';
  if(S.workout){
    const exs=S.workout.exercises;
    let curIdx=0;
    for(let i=0;i<exs.length;i++){if(exs[i].sets.length>0)curIdx=i;}
    const cur=exs[curIdx];
    if(cur)nextEx='Next: '+cur.name+' set '+(cur.sets.filter(function(s){return !s.warmup;}).length+1);
  }
  try{
    const n=new Notification('Rest done — time to go!',{
      body:nextEx,
      icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="%230D1E2E"/></svg>',
      tag:'forma-rest-timer',renotify:true,requireInteraction:false,silent:false
    });
    setTimeout(function(){n.close();},8000);
  }catch(e){}
}

// ── REST TIMER (timestamp-based — survives backgrounding) ──────
function startRestTimer(secs,exName){
  requestNotifPermission();
  if(_timerInterval) clearInterval(_timerInterval);
  const endTime=Date.now()+(secs*1000);
  S.restTimer={endTime:endTime,total:secs,_fired:false};
  localStorage.setItem('ll_rest_timer',JSON.stringify({endTime:endTime,total:secs}));
  _timerInterval=setInterval(_restTick,500);
  render();
}

function _restTick(){
  if(!S.restTimer){clearInterval(_timerInterval);return;}
  const remaining=Math.ceil((S.restTimer.endTime-Date.now())/1000);
  const el=document.getElementById('rest-timer');
  if(!el) return;
  const done=remaining<=0;
  const abs=Math.abs(remaining);
  const m=Math.floor(abs/60),s=abs%60;
  el.className='rest-timer'+(done?' done':'');
  el.querySelector('.rt-time').textContent=(done?'+':'')+m+':'+(s<10?'0':'')+s;
  el.querySelector('span').textContent=done?'GO! ':'REST ';
  if(done&&!S.restTimer._fired){
    S.restTimer._fired=true;
    if(navigator.vibrate) navigator.vibrate([300,100,300]);
    fireRestDoneNotif();
  }
  if(remaining<=-60) stopRestTimer();
}

function stopRestTimer(){
  if(_timerInterval) clearInterval(_timerInterval);
  _timerInterval=null;
  S.restTimer=null;
  localStorage.removeItem('ll_rest_timer');
  render();
}

// Restore timer on page load / tab focus
function resumeRestTimerIfActive(){
  const saved=localStorage.getItem('ll_rest_timer');
  if(!saved) return;
  try{
    const t=JSON.parse(saved);
    if(t.endTime>Date.now()-60000){
      S.restTimer={endTime:t.endTime,total:t.total,_fired:t.endTime<=Date.now()};
      if(_timerInterval) clearInterval(_timerInterval);
      _timerInterval=setInterval(_restTick,500);
    } else {
      localStorage.removeItem('ll_rest_timer');
    }
  }catch(e){localStorage.removeItem('ll_rest_timer');}
}

document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'){
    resumeRestTimerIfActive();
    if(S.restTimer) _restTick();
  }
});

const BARBELL_EX=['squat','deadlift','bench press','overhead press','barbell row','romanian deadlift','good morning','front squat','sumo deadlift','hip thrust','pendlay row','yates row','seal row'];
function isBarbell(exName){
  const n=(exName||'').toLowerCase();
  return BARBELL_EX.some(function(k){return n.includes(k);});
}
function calcPlates(totalLbs){
  const barWeight=45;
  const available=[45,35,25,10,5,2.5];
  let remaining=Math.max(0,(totalLbs-barWeight)/2);
  const result=[];
  available.forEach(function(p){
    const count=Math.floor(remaining/p+0.01); // +0.01 for float tolerance
    if(count>0){result.push({p:p,n:count});remaining=Math.round((remaining-p*count)*100)/100;}
  });
  return result;
}

  // Heavy compounds
  'Squat':135,'Back Squat':135,'Front Squat':95,'Deadlift':135,'Romanian Deadlift':95,
  'Bench Press':95,'Incline Bench':75,'Decline Bench':95,'Barbell Row':75,'Overhead Press':65,
  'Hip Thrust':95,'Good Morning':45,'Hack Squat':90,
  // Machine / moderate
  'Leg Press':180,'Chest Press':90,'Lat Pulldown':70,'Seated Cable Row':70,
  'Cable Row':70,'Smith Machine Squat':95,
  // Light compounds / bodyweight
  'Pull-Up':0,'Pull-ups':0,'Chin-Up':0,'Dips':0,'Push-Up':0,
  // Isolation — lighter
  'Bicep Curl':30,'Hammer Curl':25,'Preacher Curl':30,'Cable Curl':25,
  'Tricep Pushdown':40,'Skull Crusher':40,'Tricep Extension':35,'Overhead Tricep':30,
  'Lateral Raise':15,'Front Raise':15,'Rear Delt Fly':15,'Face Pull':30,
  'Leg Curl':50,'Leg Extension':60,'Calf Raise':90,'Seated Calf Raise':45,
  'Reverse Fly':20,'Cable Fly':30,'Cable Crossover':25,
  'Ab Wheel':0,'Plank':0,'Crunch':0,'Leg Raise':0
};
function getLastW(name){
  const s=getLastSession(name);
  if(s)return String(toDisp(s.w));
  // Smart default: look up by name, then by keyword
  const n=name.trim();
  if(EX_DEFAULTS[n]!==undefined)return String(EX_DEFAULTS[n]);
  const nl=n.toLowerCase();
  if(nl.includes('deadlift'))return '135';
  if(nl.includes('squat'))return '95';
  if(nl.includes('bench')||nl.includes('press'))return '75';
  if(nl.includes('row')||nl.includes('pull'))return '55';
  if(nl.includes('curl')||nl.includes('raise')||nl.includes('fly'))return '20';
  if(nl.includes('pushdown')||nl.includes('extension')||nl.includes('tricep'))return '35';
  if(nl.includes('calf'))return '80';
  if(nl.includes('leg press'))return '150';
  return '45'; // safe fallback (lighter than 135)
}

async function sendQuickAI(){
  const text=S.quickAIDraft.trim();
  if(!text||S.quickAILoading)return;
  const actionReply=handleUserActionIntent(text);
  if(actionReply){
    S.quickAIDraft='';
    S.quickAIReply=actionReply;
    S.messages.push({role:'user',text:text,time:NOW(),actions:[]});
    S.messages.push({role:'ai',text:actionReply,time:NOW(),actions:[]});
    saveMessages();
    render();
    return;
  }
  if(!hasKey()){S.quickAIReply=aiKeyMessage();render();return;}
  // Stop any active voice recording before sending
  if(S.quickAIListening){
    if(S._quickRec){S._quickRec.stop();S._quickRec=null;}
    S.quickAIListening=false;
  }
  S.quickAILoading=true;S.quickAIDraft='';S.quickAIReply='';render();
  // Push user message to chat history so it shows in AI tab
  S.messages.push({role:'user',text:text,time:NOW(),actions:[]});
  try{
    const resp=await fetch(API,{method:'POST',headers:apiHeaders(),body:JSON.stringify({
      model:MODEL,max_tokens:2000,
      system:buildSysPrompt()+'\n\nMODE: QUICK COMMAND. The user is making a fast request from the home screen. Be brief — one or two sentences max. Execute the action immediately. No lengthy explanations.',
      messages:[{role:'user',content:text}]
    })});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    const parsed=parseAIResponse(extractText(data.content));
    (parsed.actions||[]).forEach(function(a){applyAction(a);});
    const reply=parsed.message||'Done.';
    S.quickAIReply=reply;
    // Push AI response to chat history
    S.messages.push({role:'ai',text:reply,time:NOW(),actions:parsed.actions||[]});
  }catch(e){
    S.quickAIReply='Error: '+e.message;
    S.messages.push({role:'ai',text:'Error: '+e.message,time:NOW(),actions:[]});
  }
  S.quickAILoading=false;render();
}

async function sendQuickAIVoice(){
  if(S.quickAIListening){
    // Stop recording — do NOT auto-submit, let user review and edit
    if(S._quickRec){S._quickRec.stop();S._quickRec=null;}
    S.quickAIListening=false;
    render();
    // Focus input so user can edit before sending
    setTimeout(function(){var el=document.getElementById('quick-ai-input');if(el)el.focus();},80);
    return;
  }
  // Start recording — accumulate into draft
  S.quickAIDraft='';S.quickAIListening=true;render();
  let accumulated='';
  S._quickRec=makeVoice(
    function(final){
      accumulated+=final+' ';
      S.quickAIDraft=accumulated.trim();
      const el=document.getElementById('quick-ai-input');
      if(el)el.value=S.quickAIDraft;
    },
    function(interim){
      const el=document.getElementById('quick-ai-input');
      if(el)el.value=(accumulated+interim).trim();
    },
    function(){
      S.quickAIListening=false;S._quickRec=null;render();
    }
  );
}

    const canUp=i>0;

    const setsHtml=ex.sets.length?

        '</div>'+
        // ── Rest timers — only shown after first set ─────────────
        (ex.sets.length>0&&!isCardio?

            '<button onclick="startRestTimer(60)" style="flex:1;background:none;border:1px solid var(--dim);color:var(--muted);border-radius:8px;padding:7px 4px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">1m</button>'+
            '<button onclick="startRestTimer(90)" style="flex:1;background:none;border:1px solid var(--dim);color:var(--muted);border-radius:8px;padding:7px 4px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">90s</button>'+
            '<button onclick="startRestTimer(120)" style="flex:1;background:none;border:1px solid var(--dim);color:var(--muted);border-radius:8px;padding:7px 4px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">2m</button>'+
            '<button onclick="startRestTimer(180)" style="flex:1;background:none;border:1px solid var(--dim);color:var(--muted);border-radius:8px;padding:7px 4px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">3m</button>'+
          '</div>':
          ''))+
    '</div>';
  }).join('');

  // For cardio splits, show cardio exercise options in the add panel
  const addPanel=S.addingEx?
    '<div class="card">'+
      '<span class="lbl">ADD EXERCISE</span>'+
      '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">'+
        (isCardioSplit(w.split)?CARDIO_EX_OPTIONS:ALL_EX).filter(function(e){return!w.exercises.find(function(ae){return ae.name===e;});})
          .map(function(e){return '<button class="tag" onclick="addEx(\''+e.replace(/'/g,"\\'")+'\')" style="font-size:11px">'+e+'</button>';})
          .join('')+
      '</div>'+
      '<div style="display:flex;gap:6px">'+
        '<input id="cex" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--white);outline:none;font-family:inherit" placeholder="Custom exercise&hellip;" onkeydown="if(event.key===\'Enter\')customEx()">'+

      '</div>'+
      '<button onclick="saveTemplate()" style="background:#2DAA70;color:#fff;border:none;border-radius:9px;padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em">Save &amp; Close</button>'+
    '</div>':
    // ── Active workout header ─────────────────────────────────
    (function(){
      const elapsedMs=S.workoutStartTime?Date.now()-S.workoutStartTime:0;

        const hasSets=ex.sets.filter(function(s){return !s.warmup;}).length>0;

    '</div>')+

  inlineAI+
  exCards+
  addPanel+
  '<div style="height:calc(24px + env(safe-area-inset-bottom))"></div>'+
  histPanel+
  instructPanel;
}

function vExHistoryPanel(name){
  // Collect all history for this exercise
  const history=[];
  S.workouts.forEach(function(w){
    w.exercises.forEach(function(ex){
      if(ex.name!==name)return;
      const allSets=ex.sets.filter(function(s){return (s.w>0||s.r>0);});
      const workSets=allSets.filter(function(s){return !s.warmup;});
      // Keep sessions visible even if they contain warm-up sets. PR/top-set calculations still ignore warm-ups.
      const bestSet=workSets.length?workSets.reduce(function(b,s){return e1rm(s.w,s.r)>e1rm(b.w,b.r)?s:b;},workSets[0]):null;
      history.push({date:w.date,sets:allSets,workSets:workSets,bestSet:bestSet,e1:bestSet?e1rm(bestSet.w,bestSet.r):0});
    });
  });

  const isCardio=isCardioEx(name);
  const allTimeMax=history.length?Math.max.apply(null,history.map(function(h){return h.e1;})):0;

  return '<div style="position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;justify-content:flex-end" onclick="S.exHistoryPanel=null;render()">'+
    '<div ontouchstart="sheetTouchStart(event)" ontouchmove="sheetTouchMove(event)" ontouchend="sheetTouchEnd(\'exHistory\')" onclick="event.stopPropagation()" style="background:var(--s1);border-radius:20px 20px 0 0;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,.15)">'+

      // Handle bar
      '<div style="display:flex;justify-content:center;padding:10px 0 0">'+
        '<div style="width:36px;height:4px;background:var(--border);border-radius:2px"></div>'+
      '</div>'+

      // Header
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px">'+
        '<div>'+
          '<div style="font-size:17px;font-weight:700;color:var(--white);letter-spacing:-.3px">'+name+'</div>'+
          '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+history.length+' session'+(history.length!==1?'s':'')+' logged</div>'+
        '</div>'+
        (allTimeMax>0?'<div style="text-align:right">'+
          '<div style="font-size:11px;color:var(--muted);margin-bottom:2px">All-time best</div>'+
          '<div style="font-size:18px;font-weight:700;color:var(--blue);font-family:\'Courier New\',monospace">'+toDisp(allTimeMax)+' <span style="font-size:11px;font-weight:400">'+uLbl()+'</span></div>'+
        '</div>':'')+
      '</div>'+

async function sendExInstructChat(){
  const text=S.exInstructDraft.trim();
  if(!text||S.exInstructChatLoading)return;
  S.exInstructChat.push({role:'user',text:text});
  S.exInstructDraft='';
  if(!hasKey()){S.exInstructChat.push({role:'ai',text:aiKeyMessage()});render();return;}
  S.exInstructChatLoading=true;
  render();
  // Scroll chat to bottom
  setTimeout(function(){const el=document.getElementById('ex-instruct-scroll');if(el)el.scrollTop=el.scrollHeight;},50);
  try{
    const messages=[
      {role:'user',content:'Here are the instructions for "'+S.exInstructPanel+'":\n\n'+S.exInstructText}
    ];
    // Add prior Q&A turns
    S.exInstructChat.slice(0,-1).forEach(function(m){
      messages.push({role:m.role==='user'?'user':'assistant',content:m.text});
    });
    messages.push({role:'user',content:text});
    const resp=await fetch(API,{method:'POST',headers:apiHeaders(),body:JSON.stringify({
      model:MODEL,max_tokens:2500,
      thinking:{type:'enabled',budget_tokens:1024},
      system:'You are an expert strength coach. Answer concisely about the exercise "'+S.exInstructPanel+'". Be practical, specific, and under 120 words unless the question genuinely needs more detail.',
      messages:messages
    })});
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message);
    S.exInstructChat.push({role:'ai',text:extractText(data.content)});
  }catch(e){
    S.exInstructChat.push({role:'ai',text:'Sorry, could not get an answer: '+e.message});
  }
  S.exInstructChatLoading=false;
  render();
  setTimeout(function(){const el=document.getElementById('ex-instruct-scroll');if(el)el.scrollTop=el.scrollHeight;},50);
}

async function showExInstruct(name){
  S.exInstructPanel=name;
  S.exInstructText=null;
  S.exInstructLoading=hasKey();
  S.exInstructChat=[];
  S.exInstructDraft='';
  S.exInstructChatLoading=false;
  render();
  if(!hasKey()){
    S.exInstructText=aiKeyMessage();
    S.exInstructLoading=false;
    render();
    return;
  }
  // Try with thinking first, then without, then fall back to static content
  const prompt=
    'Give concise, expert instructions for how to perform "'+name+'" with perfect form. Structure your response with these sections:\n\n'+
    '**Setup** — starting position, grip, stance\n'+
    '**Execution** — step by step movement cues (3-5 bullet points)\n'+
    '**Key cues** — 2-3 short coaching cues to remember\n'+
    '**Common mistakes** — 2-3 things to avoid\n\n'+
    'Keep it practical and actionable. No fluff. Under 200 words total.';
  const sys='You are an expert strength and conditioning coach. Give clear, practical exercise instructions.';
  let text=null;
  // Attempt 1: with thinking (budget ≥1024 required)
  try{
    const resp=await fetch(API,{method:'POST',headers:apiHeaders(),body:JSON.stringify({
      model:MODEL,max_tokens:3000,thinking:{type:'enabled',budget_tokens:1024},
      stream:false,system:sys,messages:[{role:'user',content:prompt}]
    })});
    const raw=await resp.text();
    console.log('[ExInstruct attempt1 raw]',raw.slice(0,400));
    const data=JSON.parse(raw);
    if(!data.error) text=extractText(data.content);
    else console.warn('[ExInstruct attempt1 api error]',JSON.stringify(data.error));
  }catch(e){console.warn('[ExInstruct attempt1 catch]',e.message);}
  // Attempt 2: without thinking
  if(!text){
    try{
      const resp=await fetch(API,{method:'POST',headers:apiHeaders(),body:JSON.stringify({
        model:MODEL,max_tokens:1000,stream:false,
        system:sys,messages:[{role:'user',content:prompt}]
      })});
      const raw=await resp.text();
      console.log('[ExInstruct attempt2 raw]',raw.slice(0,400));
      const data=JSON.parse(raw);
      if(!data.error) text=extractText(data.content);
      else console.warn('[ExInstruct attempt2 api error]',JSON.stringify(data.error));
    }catch(e){console.warn('[ExInstruct attempt2 catch]',e.message);}
  }
  S.exInstructText=text||('**'+name+'**\n\nInstructions are unavailable right now. Check your internet connection or API key and try again by closing and reopening this panel.');
  S.exInstructLoading=false;
  render();
}

    },
    {

      subs:[
        {

          exercises:['Dumbbell Curl','Hammer Curl','Barbell Curl','Incline Curl','Incline Hammer Curls','Cable Curl'],
          bwMult:[0.13,0.20,0.28,0.38,0.50],

        },
        {

          exercises:['Tricep Pushdown','Tricep Press Machine','Skull Crusher','Overhead Tricep Extension','Cable Overhead Extension'],

  function getBestE1(exList){
    let best=0;
    exList.forEach(function(exName){
      S.workouts.forEach(function(w){
        const ex=w.exercises.find(function(e){return e.name===exName;});
        if(!ex)return;
        ex.sets.filter(function(s){return !s.warmup&&s.w>0&&s.r>0;}).forEach(function(s){
          const v=toDisp(e1rm(s.w,s.r));
          if(v>best)best=v;
        });
      });

    return Math.round(best);

  function getVolumeSessions(exList){
    return S.workouts.filter(function(w){

  function getStd(sub){
    if(hasBW&&sub.bwMult) return sub.bwMult.map(function(m){return Math.round(bwLbs*m);});

  }

  function getLevel(val,std){
    if(!val||val===0)return 0;
    for(let i=std.length-1;i>=0;i--){if(val>=std[i])return i+1;}

      S._scoreResults[sub.name]=result; // store for detail panel
      return result;
    });

  function getLevel(val,std){
    if(!val||val===0)return 0;
    for(let i=std.length-1;i>=0;i--){if(val>=std[i])return i+1;}
    return 1;
  }
  function getScore(val,std){
    if(!val||val===0)return 0;
    if(val>=std[4])return Math.min(100,Math.round(90+10*(val-std[4])/std[4]));
    for(let i=0;i<std.length-1;i++){
      if(val<std[i+1]){
        const base=(i+1)*18;
        const pct=(val-std[i])/(std[i+1]-std[i]);
        return Math.round(base+pct*18);
      }
    }
    return 8;
  }

  // Build results
  const allScores=[];
  const parentHtml=PARENT_GROUPS.map(function(pg){
    const subResults=pg.subs.map(function(sub){
      const isVol=sub.type==='volume';
      let val,score,level;
      if(isVol){
        val=getVolumeSessions(sub.exercises);
        // Volume: score based on sessions
        score=Math.min(100,Math.round(val*8));
        level=val===0?0:val<3?1:val<7?2:val<14?3:val<25?4:5;
      } else {
        val=getBestE1(sub.exercises);
        score=getScore(val,sub.std);
        level=getLevel(val,sub.std);
      }
      allScores.push(score);
      const levelName=LEVELS[Math.min(level,5)];
      const levelColor=LEVEL_COLORS[Math.min(level,5)];
      const nextStd=!isVol&&sub.std[level]?sub.std[level]:null;
      const needed=nextStd&&val>0&&level<5?Math.ceil(nextStd-val):null;
      return {sub,val,score,level,levelName,levelColor,nextStd,needed,isVol};
    });

    const avgScore=Math.round(subResults.reduce(function(a,r){return a+r.score;},0)/subResults.length);
    const avgLevel=Math.round(subResults.reduce(function(a,r){return a+r.level;},0)/subResults.length);

    return '<div style="background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px">'+
      // Parent header
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<div style="width:3px;height:16px;background:'+pg.color+';border-radius:2px"></div>'+
          '<span style="font-size:13px;font-weight:800;color:var(--white);letter-spacing:-.2px">'+pg.name+'</span>'+
        '</div>'+
        '<span style="font-size:11px;font-weight:700;color:'+LEVEL_COLORS[Math.min(avgLevel,5)]+'">'+LEVELS[Math.min(avgLevel,5)]+'</span>'+
      '</div>'+
      subResults.map(function(r){
        return '<div style="margin-bottom:11px;padding-left:11px;border-left:1px solid var(--border)">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
            '<div>'+
              '<span style="font-size:12px;font-weight:700;color:var(--white)">'+r.sub.name+'</span>'+
              '<span style="font-size:10px;color:var(--muted);margin-left:5px">'+r.sub.note+'</span>'+
            '</div>'+
            '<div style="text-align:right;flex-shrink:0;margin-left:8px">'+
              '<span style="font-size:10px;font-weight:700;color:'+r.levelColor+'">'+r.levelName+'</span>'+
              (r.val>0&&!r.isVol?'<span style="font-size:9px;color:var(--muted);margin-left:4px">'+r.val+' '+uLbl()+'</span>':
               r.isVol&&r.val>0?'<span style="font-size:9px;color:var(--muted);margin-left:4px">'+r.val+'&times;</span>':
               '<span style="font-size:9px;color:var(--dim);margin-left:4px">no data</span>')+
            '</div>'+
          '</div>'+
          '<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">'+
            '<div style="height:100%;width:'+r.score+'%;background:'+pg.color+';border-radius:2px;opacity:'+(r.val>0?1:0.2)+';transition:width .5s ease"></div>'+
          '</div>'+
          (r.needed&&r.level<5?'<div style="font-size:9px;color:var(--dim);margin-top:3px">'+r.needed+' '+uLbl()+' to '+LEVELS[Math.min(r.level+1,5)]+'</div>':'')+
        '</div>';
      }).join('')+
    '</div>';
  }).join('');
function vHeatmap(){
  if(!S.workouts.length)return '<div style="color:var(--muted);text-align:center;margin-top:60px;font-size:13px">No workouts yet.</div>';

  const WEEKS=18;
  const today=new Date();
  // Start from Monday of (WEEKS) weeks ago
  const start=new Date(today);
  start.setDate(today.getDate()-(WEEKS*7));
  const dow=start.getDay();
  start.setDate(start.getDate()+(dow===0?1:dow===1?0:8-dow));

  // Build lookup: 'YYYY-MM-DD' -> {split, idx}
  const lookup={};
  S.workouts.forEach(function(w,idx){
    const d=new Date(w.date);
    if(isNaN(d.getTime()))return;
    const key=d.toISOString().slice(0,10);
    if(!lookup[key])lookup[key]={split:w.split,idx:idx};
  });
  const todayKey2=today.toISOString().slice(0,10);

  // Stats
  const totalDays=S.workouts.length;
  const last30=S.workouts.filter(function(w){return new Date(w.date)>new Date(today-30*864e5);}).length;
  const splitCount={};
  S.workouts.forEach(function(w){splitCount[w.split]=(splitCount[w.split]||0)+1;});
  const topSplit=Object.entries(splitCount).sort(function(a,b){return b[1]-a[1];})[0];

  // Generate grid: rows=Mon-Sun, cols=weeks
  const DAY_LABELS=['M','T','W','T','F','S','S'];
  let gridHtml='<div style="display:flex;gap:4px">'+
    // Day labels column
    '<div style="display:flex;flex-direction:column;gap:3px;padding-top:0;flex-shrink:0">'+
      DAY_LABELS.map(function(d){
        return '<div style="width:12px;height:14px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--muted);font-weight:600">'+d+'</div>';
      }).join('')+
    '</div>'+
    // Weeks columns
    '<div style="flex:1;overflow-x:auto;scrollbar-width:none">'+
    '<div style="display:flex;gap:3px;min-width:max-content">';

  for(let w=0;w<WEEKS;w++){
    gridHtml+='<div style="display:flex;flex-direction:column;gap:3px">';
    for(let d=0;d<7;d++){
      const date=new Date(start);
      date.setDate(start.getDate()+w*7+d);
      if(date>today){gridHtml+='<div style="width:14px;height:14px"></div>';continue;}
      const key=date.toISOString().slice(0,10);
      const entry=lookup[key];
      const isToday=key===todayKey2;
      const col=entry?spCol(entry.split):'none';
      const bg=entry?hexA(col,.85):(isToday?'var(--border)':'var(--s2)');
      const border=isToday?'1.5px solid var(--blue)':'1.5px solid transparent';
      gridHtml+='<div onclick="'+(entry?'selCalWorkout('+entry.idx+')':'')+'" '+
        'style="width:14px;height:14px;border-radius:3px;background:'+bg+';border:'+border+';cursor:'+(entry?'pointer':'default')+';" '+
        'title="'+(entry?spLbl(entry.split)+' — '+key:key)+'"></div>';
    }
    // Week label every 4 weeks
    gridHtml+='</div>';
  }
  gridHtml+='</div></div></div>';

  // Month labels
  const monthLabels=[];
  let lastMonth=-1;
  for(let w=0;w<WEEKS;w++){
    const d=new Date(start);d.setDate(start.getDate()+w*7);
    if(d.getMonth()!==lastMonth){
      monthLabels.push({w,label:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]});
      lastMonth=d.getMonth();
    }
  }
  // Build month row
  let monthRow='<div style="display:flex;gap:3px;margin-left:16px;margin-bottom:4px;overflow:hidden">';
  for(let w=0;w<WEEKS;w++){
    const lbl=monthLabels.find(function(m){return m.w===w;});
    monthRow+='<div style="width:14px;flex-shrink:0;font-size:8px;color:var(--sub);font-weight:600;white-space:nowrap;overflow:visible">'+(lbl?lbl.label:'')+'</div>';
  }
  monthRow+='</div>';

  // Split legend
  const legend='<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:14px">'+
    allSplits().filter(function(s){return s!=='rest'&&splitCount[s];}).map(function(s){
      const c=spCol(s);
      return '<div style="display:flex;align-items:center;gap:4px">'+
        '<div style="width:10px;height:10px;border-radius:2px;background:'+hexA(c,.85)+'"></div>'+
        '<span style="font-size:10px;color:var(--sub)">'+spLbl(s)+' ('+splitCount[s]+')</span>'+
      '</div>';
    }).join('')+
  '</div>';

  // Summary stats
  const stats='<div style="display:flex;gap:10px;margin-bottom:18px">'+
    '<div style="flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">'+
      '<div class="mono" style="font-size:22px;font-weight:800;color:var(--blue)">'+totalDays+'</div>'+
      '<div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.05em">TOTAL</div>'+
    '</div>'+
    '<div style="flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">'+
      '<div class="mono" style="font-size:22px;font-weight:800;color:var(--blue)">'+last30+'</div>'+
      '<div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.05em">LAST 30 DAYS</div>'+
    '</div>'+
    (topSplit?'<div style="flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center">'+
      '<div style="font-size:14px;font-weight:800;color:'+spCol(topSplit[0])+'">'+spLbl(topSplit[0]).toUpperCase()+'</div>'+
      '<div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.05em">MOST TRAINED</div>'+
    '</div>':'')+
  '</div>';

  return stats+
    '<span class="lbl" style="margin-bottom:8px">CONSISTENCY — '+WEEKS+' WEEKS</span>'+
    monthRow+gridHtml+legend;
}

// ── PR WALL ───────────────────────────────────────────────────
function vPRWall(){
  if(!S.workouts.length)return '<div style="color:var(--muted);text-align:center;margin-top:60px;font-size:13px">No workouts yet.</div>';

  const now=new Date();
  const twoWeeksAgo=new Date(now-14*864e5);

  // Find all-time best e1RM per exercise, track date achieved
  const prs={};
  S.workouts.forEach(function(w){
    (w.exercises||[]).forEach(function(ex){
      if(!ex||!Array.isArray(ex.sets)||isCardioEx(ex.name))return;
      const workSets=ex.sets.filter(function(s){return !s.warmup&&s.w>0&&s.r>0;});
      if(!workSets.length)return;
      workSets.forEach(function(s){
        const e=e1rm(s.w,s.r);
        if(!prs[ex.name]||e>prs[ex.name].e1){
          prs[ex.name]={e1:e,w:s.w,r:s.r,date:w.date,split:w.split};
        }
      });
    });
  });

  if(!Object.keys(prs).length)return '<div style="color:var(--muted);text-align:center;margin-top:60px;font-size:13px">Log some workouts to see your PRs.</div>';

  // Sort by e1RM descending
  const sorted=Object.entries(prs).sort(function(a,b){return b[1].e1-a[1].e1;});

  // Group by split
  const bySplit={};
  sorted.forEach(function(entry){
    const sp=entry[1].split;
    if(!bySplit[sp])bySplit[sp]=[];
    bySplit[sp].push(entry);
  });

  let html='';

  // Top 3 PRs — featured
  const top3=sorted.slice(0,3);
  html+='<span class="lbl" style="margin-bottom:10px">TOP LIFTS</span>'+
    '<div class="tour-records-target" style="display:flex;gap:8px;margin-bottom:20px">'+
    top3.map(function(entry,ri){
      const name=entry[0];const pr=entry[1];
      const isRecent=new Date(pr.date)>twoWeeksAgo;
      const col=spCol(pr.split);
      const medals=['🥇','🥈','🥉'];
      return '<div style="flex:1;background:var(--s1);border:1px solid '+hexA(col,.3)+';border-radius:12px;padding:12px;text-align:center">'+
        '<div style="font-size:18px;margin-bottom:4px">'+medals[ri]+'</div>'+
        '<div style="font-size:11px;font-weight:700;color:var(--white);margin-bottom:4px;line-height:1.2">'+name+'</div>'+
        '<div class="mono" style="font-size:18px;font-weight:800;color:'+col+'">'+toDisp(pr.e1)+'</div>'+
        '<div style="font-size:9px;color:var(--muted)">'+uLbl()+' e1RM</div>'+
        '<div style="font-size:9px;color:var(--muted);margin-top:3px">'+toDisp(pr.w)+' × '+pr.r+'</div>'+
        (isRecent?'<div style="font-size:8px;font-weight:700;color:#2DAA70;margin-top:4px;background:rgba(45,170,112,.1);border-radius:4px;padding:2px 4px">NEW &#9650;</div>':'')+
      '</div>';
    }).join('')+
  '</div>';

  // Full list grouped by split
  html+='<span class="lbl" style="margin-bottom:10px">ALL RECORDS</span>';
  Object.entries(bySplit).forEach(function(splitEntry){
    const sp=splitEntry[0];const entries=splitEntry[1];
    const col=spCol(sp);
    html+='<div style="margin-bottom:14px">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
        '<div style="width:8px;height:8px;border-radius:50%;background:'+col+'"></div>'+
        '<span style="font-size:10px;font-weight:700;color:'+col+';letter-spacing:.08em">'+spLbl(sp).toUpperCase()+'</span>'+
      '</div>'+
      entries.map(function(entry){
        const name=entry[0];const pr=entry[1];
        const isRecent=new Date(pr.date)>twoWeeksAgo;
        const dateStr=fmtD(pr.date);
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:5px">'+
          '<div>'+
            '<div style="font-size:13px;font-weight:700;color:var(--white)">'+name+
              (isRecent?' <span style="font-size:8px;font-weight:700;color:#2DAA70;background:rgba(45,170,112,.1);border-radius:3px;padding:1px 4px">NEW</span>':'')+
            '</div>'+
            '<div style="font-size:10px;color:var(--muted);margin-top:1px">'+dateStr+'</div>'+
          '</div>'+
          '<div style="text-align:right">'+
            '<div class="mono" style="font-size:14px;font-weight:700;color:var(--blue)">'+toDisp(pr.e1)+' <span style="font-size:9px;color:var(--muted)">'+uLbl()+'</span></div>'+
            '<div style="font-size:10px;color:var(--sub)">'+toDisp(pr.w)+' '+uLbl()+' × '+pr.r+'</div>'+
          '</div>'+
        '</div>';
      }).join('')+
    '</div>';
  });

  return html;
}

      {val:'Bro split',            svg:'<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l7.78-7.78a5.5 5.5 0 000-7.78z"/>'},
      {val:'Let the AI decide',    svg:'<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>'},
    ]},
  // 12 — generating
  {type:'generating'},
];

function obPrefersMetric(){
  const u=String(S.obData.unit_system||'').toLowerCase();
  return u.indexOf('metric')>=0||u.indexOf('kg')>=0;
}
function obUnitFor(key){
  if(key==='bodyweight')return obPrefersMetric()?'kg':'lbs';
  if(key==='height')return obPrefersMetric()?'cm':'';
  return '';
}
function obPlaceholderFor(def){
  if(def.placeholder!=='auto')return def.placeholder||'';
  if(def.key==='bodyweight')return obPrefersMetric()?'80':'175';
  if(def.key==='height')return obPrefersMetric()?'180':'';
  return '';
}
function obSetImperialHeight(){
  const ft=(document.getElementById('ob-height-ft')||document.getElementById('ob-input')||{}).value||'';
  const inch=(document.getElementById('ob-height-in')||{}).value||'';
  S.obData.height_feet=ft;
  S.obData.height_inches=inch;
  S.obData.height=(ft.trim()&&inch.trim())?(ft.trim()+"'"+inch.trim()+'\"'):'';
  obSyncContinue('height',false);
}

function obImperialHeightOk(){
  return String(S.obData.height_feet||'').trim().length>0&&String(S.obData.height_inches||'').trim().length>0;
}

        '</div>'+
      '</div>'+
      // Footer
      obFooter(step, canNext)+

  }

  // ── Choice step ───────────────────────────────────────────────

            '<div class="ob-choice-check" style="margin-left:auto;flex-shrink:0;display:'+(otherSel?'flex':'none')+';width:18px;height:18px;border-radius:50%;background:var(--blue);align-items:center;justify-content:center">'+
              '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'+
            '</div>'+
          '</button>'+
          // Other text input — only shown when Other is selected
          (otherSel?
            '<input id="ob-other-input" type="text" placeholder="Describe your goal…" '+

              'style="width:100%;background:var(--s1);border:2px solid '+(otherText.trim()?'var(--blue)':'var(--border)')+';border-radius:11px;padding:13px 14px;font-size:14px;color:var(--white);outline:none;font-family:inherit;margin-top:4px">':
            '')+

      obFooter(step, canNext)+

  }

  return '';
}

function obProgressBar(pct,step){
  return '<div style="padding:calc(env(safe-area-inset-top) + 16px) 24px 0">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
      '<button onclick="obBack()" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px">'+
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>Back'+
      '</button>'+
      '<span style="font-size:11px;color:var(--muted);font-weight:600">'+step+' of '+(OB_STEPS.length-2)+'</span>'+
    '</div>'+
    '<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px">'+
      '<div style="height:100%;width:'+pct+'%;background:var(--blue);border-radius:2px;transition:width .3s ease"></div>'+
    '</div>'+
  '</div>';
}

function obFooter(step, canNext){
  return '<div style="padding:16px 24px calc(24px + env(safe-area-inset-bottom))">'+
    '<button id="ob-continue-btn" onclick="obNext()" '+(canNext?'':'disabled')+
      ' style="width:100%;background:'+(canNext?'var(--blue)':'var(--border)')+';color:'+(canNext?'#fff':'var(--muted)')+';border:none;border-radius:14px;padding:17px;font-size:16px;font-weight:700;cursor:'+(canNext?'pointer':'default')+';font-family:inherit;transition:background .15s">'+
      'Continue →'+
    '</button>'+
  '</div>';
}

// Toggle a choice option without full re-render (prevents double-click)
function obToggleChoice(key, val, multi){
  if(!Array.isArray(S.obData[key]))S.obData[key]=S.obData[key]?[S.obData[key]]:[];
  const arr=S.obData[key];
  const idx=arr.indexOf(val);
  if(multi){
    if(idx>=0)arr.splice(idx,1); else arr.push(val);
  } else {
    S.obData[key]=[val]; // single-select: replace
  }
  // If Other was deselected, clear text
  if(val==='__other__'&&idx>=0)S.obData[key+'_other']='';
  // Re-render only when Other is toggled (need to show/hide input)
  if(val==='__other__'){render();return;}
  // Surgical DOM update — no full render
  document.querySelectorAll('.ob-choice-btn[data-key="'+key+'"]').forEach(function(btn){
    const bval=btn.getAttribute('data-val');
    const sel=S.obData[key].includes(bval);
    btn.style.border='2px solid '+(sel?'var(--blue)':'var(--border)');
    btn.style.background=sel?'rgba(26,158,212,.08)':'var(--s1)';
    const lbl=btn.querySelector('.ob-choice-label');
    if(lbl){lbl.style.fontWeight=sel?'700':'500';lbl.style.color=sel?'var(--blue)':'var(--white)';}
    const chk=btn.querySelector('.ob-choice-check');
    if(chk)chk.style.display=sel?'flex':'none';
    const ico=btn.querySelector('div');
    if(ico){ico.style.background=sel?'rgba(26,158,212,.15)':'var(--s2)';}
    const svg=btn.querySelector('svg');
    if(svg)svg.setAttribute('stroke',sel?'var(--blue)':'var(--sub)');
  });
  obSyncChoiceContinue(key);
}

function obSyncChoiceContinue(key){
  const arr=S.obData[key]||[];
  const otherSel=Array.isArray(arr)&&arr.includes('__other__');
  const otherText=(S.obData[key+'_other']||'').trim();
  const ok=arr.length>0&&(!otherSel||otherText.length>0);
  const btn=document.getElementById('ob-continue-btn');
  if(!btn)return;
  btn.disabled=!ok;
  btn.style.background=ok?'var(--blue)':'var(--border)';
  btn.style.color=ok?'#fff':'var(--muted)';
  btn.style.cursor=ok?'pointer':'default';
}

function obBack(){
  if(S.obStep>1)S.obStep--;
  render();
}

// Update just the continue button enabled state without a full re-render
// so the keyboard stays open while typing
function obSyncContinue(key, optional){
  const val=(S.obData[key]||'').trim();
  const btn=document.querySelector('#ob-continue-btn');
  if(!btn)return;
  const ok=key==='height'&&!obPrefersMetric()?obImperialHeightOk():(optional||val.length>0);
  if(key==='height'&&!obPrefersMetric()){
    S.obData.height=ok?(String(S.obData.height_feet||'').trim()+"'"+String(S.obData.height_inches||'').trim()+'\"'):'';
  }
  btn.disabled=!ok;
  btn.style.background=ok?'var(--blue)':'var(--border)';
  btn.style.color=ok?'#fff':'var(--muted)';
  btn.style.cursor=ok?'pointer':'default';
  // Also update border of the input wrapper
  const inp=document.getElementById('ob-input-wrap')||document.getElementById('ob-input');
  if(inp)inp.style.border='2px solid '+(val?'var(--blue)':'var(--border)');
  const inp2=document.getElementById('ob-input-wrap-2');
  if(inp2&&key==='height')inp2.style.border='2px solid '+((S.obData.height_inches||'').trim()?'var(--blue)':'var(--border)');
}

function obNext(){
  const step=S.obStep;
  const def=OB_STEPS[step];
  if(def.type==='text'&&def.key==='height'&&!obPrefersMetric()){
    if(!obImperialHeightOk())return;
    S.obData.height=String(S.obData.height_feet||'').trim()+"'"+String(S.obData.height_inches||'').trim()+'\"';
  }
  if(def.type==='text'&&!def.optional&&!(S.obData[def.key]||'').trim())return;
  if(def.type==='choice'){
    const arr=S.obData[def.key]||[];
    if(!arr.length)return;
    const otherSel=arr.includes('__other__');
    if(otherSel&&!(S.obData[def.key+'_other']||'').trim())return;
    // Flatten: replace __other__ with actual text, join multiple selections
    const resolved=arr.map(function(v){return v==='__other__'?(S.obData[def.key+'_other']||'').trim():v;}).filter(Boolean);
    S.obData[def.key]=def.multi?resolved.join(', '):resolved[0];
    if(def.key==='unit_system'){
      S.unit=String(S.obData.unit_system).toLowerCase().indexOf('metric')>=0?'kg':'lbs';
      persist('ll_unit',S.unit);
    }
  }
  if(step===OB_STEPS.length-2){
    // Last real step — trigger AI generation
    obGenerate();
  } else {
    S.obStep++;
    render();
    // Auto-focus text inputs
    setTimeout(function(){const el=document.getElementById('ob-input');if(el)el.focus();},80);
  }
}

async function obGenerate(){
  S.obStep=OB_STEPS.length-1; // show generating screen
  render();
  const d=S.obData;
  const prompt=
    'New user onboarding data:\n'+
    'Name: '+(d.name||'not provided')+'\n'+
    'Age: '+(d.age||'not provided')+'\n'+
    'Preferred units: '+(d.unit_system||S.unit||'not provided')+'\n'+
    'Bodyweight: '+(d.bodyweight||'not provided')+' '+(obUnitFor('bodyweight')||'')+'\n'+
    'Height: '+(d.height||'not provided')+' '+(obUnitFor('height')||'')+'\n'+
    'Goal: '+(d.goal||'not provided')+'\n'+
    'Experience: '+(d.experience||'not provided')+'\n'+
    'Days per week: '+(d.days_per_week||'not provided')+'\n'+
    'Session length: '+(d.session_duration||'not provided')+'\n'+
    'Equipment: '+(d.equipment||'not provided')+'\n'+
    'Injuries/limitations: '+(d.injuries||'none')+'\n'+
    'Split preference: '+(d.split_pref||'not provided')+'\n\n'+
    'Based on this, do the following:\n'+
    '1. Call update_profile with name, goal, experience, session_duration, exercises_per_session (derive from session length), equipment, injuries, bodyweight (number only, already in user display unit), height (include unit or plain number as provided).\n'+
    '2. Call update_schedule to set the weekly schedule based on their days and split preference.\n'+
    '3. Call update_split_exercises to fill each split day with the best exercises for their goal and equipment.\n'+
    'Also include a "rationale" field in your JSON: 2–3 sentences explaining WHY you chose this specific schedule for them — mention the split type, days, and how it fits their goal. Make it personal and direct. Keep it under 60 words.\n'+
    'Respond ONLY with valid JSON: {"message":"...","rationale":"...","actions":[...]}';
  try{
    if(!hasKey())throw new Error(aiKeyMessage());
    const resp=await fetch(API,{method:'POST',headers:apiHeaders(),body:JSON.stringify({
      model:MODEL,max_tokens:4000,thinking:{type:'enabled',budget_tokens:1024},
      system:buildSysPrompt()+'\nYou are completing a new user onboarding. Apply all 3 actions (update_profile, update_schedule, update_split_exercises) based on the data provided. Respond ONLY with valid JSON: {"message":"...","rationale":"...","actions":[...]}',
      messages:[{role:'user',content:prompt}]
    })});
    const raw=await resp.text();
    const data=JSON.parse(raw);
    if(data.error)throw new Error(data.error.message);
    const parsed=parseAIResponse(extractText(data.content));
    (parsed.actions||[]).forEach(function(a){applyAction(a);});
    if(parsed.message){
      S.messages=[{role:'ai',text:parsed.message,time:NOW(),actions:[]}];
    }
    if(parsed.rationale){
      S.scheduleRationale={text:parsed.rationale,dismissed:false};
    }
  }catch(e){
    console.warn('[obGenerate error]',e.message);
    // Apply what we can from the form data directly
    S.profile.name=d.name||S.profile.name;
    S.profile.goal=d.goal||S.profile.goal;
    S.profile.experience=d.experience||S.profile.experience;
    S.profile.equipment=d.equipment||S.profile.equipment;
    S.profile.injuries=d.injuries||S.profile.injuries;
    if(d.bodyweight)S.profile.bodyweight=parseFloat(d.bodyweight)||S.profile.bodyweight;
    if(d.height)S.profile.height=d.height;
    persist('ll_profile',S.profile);
  }
  S.onboarded=true;
  persist('ll_onboarded',true);
  S.obStep=0;
  S.obData={};
  S.view='home';
  if(shouldShowFeatureTour())S.tourPrompt=true;
  render();
}

function applyTourStep(){

function makeTourDemoState(){
  const base=new Date();
  const iso=function(daysAgo){
    const d=new Date(base);
    d.setDate(d.getDate()-daysAgo);
    d.setHours(18,15,0,0);
    return d.toISOString();
  };
  const splits=['push','pull','legs','upper','lower'];
  const dayKeys=['sun','mon','tue','wed','thu','fri','sat'];
  const todayIdx=new Date().getDay();
  const tourSchedule={};
  ['push','pull','legs','upper','lower','rest','rest'].forEach(function(sp,offset){
    tourSchedule[dayKeys[(todayIdx+offset)%7]]=sp;
  });
  const names={
    push:['Bench Press','Incline Bench','Tricep Pushdown','Bulgarian Split Squat'],
    pull:['Barbell Row','Lat Pulldown','Face Pull'],
    legs:['Squat','Leg Extension','Leg Curl'],
    upper:['Overhead Press','Pull-Up','Chest Press'],
    lower:['Deadlift','Leg Press','Calf Raise']
  };
  const workouts=[];
  for(let i=0;i<14;i++){
    const sp=splits[i%splits.length];
    const bump=Math.floor(i/5);
    workouts.push({
      date:iso(28-i*2),
      split:sp,
      debrief:i===10?'Bench is moving well. Squat held steady for two leg sessions.':'Tour demo workout.',
      exercises:names[sp].map(function(n,ei){
        const baseW={push:70,pull:55,legs:95,upper:45,lower:115}[sp]+ei*8+bump*2;
        const top=n==='Tricep Pushdown'?75/KG2LB:(n==='Bench Press'&&i>8?84:n==='Squat'&&i>9?102:baseW);
        return {name:n,sets:[
          {w:Math.max(0,top*.45),r:8,warmup:true},
          {w:top,r:n==='Tricep Pushdown'?9:(ei===0?6+bump:10)},
          {w:top,r:n==='Tricep Pushdown'?9:(ei===0?5+bump:9)}
        ]};
      })
    });
  }
  workouts.reverse();
  const workout=makeTourActiveWorkout();
  return {
    loaded:true,
    view:'home',
    onboarded:true,
    unit:'lbs',
    workouts:workouts,
    workout:workout,
    workoutStartTime:Date.now(),
    schedule:tourSchedule,
    splitEx:names,
    selStripDay:dayKeys[todayIdx],
    progressTab:'progress',
    selEx:'Bench Press',
    dayPreviewPanel:null,
    exHistoryPanel:null,
    exInstructPanel:null,
    scoreDetail:null,
    restTimer:null,
    quickAIOpen:false,
    pendingAction:null,
    messages:[
      {role:'user',text:'What’s my biggest weakness right now, and what should I do about it?',time:'Demo',actions:[]},
      {role:'ai',text:'Your pulling volume is lagging behind your pressing, and rows have stalled for 3 sessions. I’d recommend adding 2–3 hard sets of chest-supported rows this week while keeping bench volume unchanged.',time:'Demo',actions:[]}
    ],
    profile:{name:'Demo Athlete',goal:'Build muscle and strength',experience:'Intermediate',session_duration:60,exercises_per_session:5,equipment:'Full gym',injuries:'',preferences:''},
    recent:workouts.slice(-3).reverse(),
    prs:[
      {name:'Bench Press',from:'170×8',to:'185×7'},
      {name:'Squat',from:'205×6',to:'225×5'},
      {name:'Deadlift',from:'255×5',to:'275×4'}
    ],
    plateau:{name:'Bench Press is trending up, but Squat has repeated the same top set twice.',note:'I’d recommend staying at 225 for now and aiming for 6–7 clean reps before increasing the weight.'},
    ai:'Bench has been steady at 185×7 for three sessions. Keep the weight and aim for 185×8 next time.'
  };
}

function positionTourSpotlight(){
  const spot=document.getElementById('tour-spotlight');
  if(!spot||!S.tourActive)return;
  const step=tourSteps()[S.tourStep];
  if(!step)return;
  const target=document.querySelector(step.selector);
  if(!target){spot.style.display='none';return;}
  let r=target.getBoundingClientRect();
  const coach=document.querySelector('.tour-coach-card');
  const coachTop=coach?coach.getBoundingClientRect().top:window.innerHeight;
  if(r.top<72||r.bottom>coachTop-18){
    try{target.scrollIntoView({block:'center',inline:'nearest'});}catch(e){target.scrollIntoView();}
    r=target.getBoundingClientRect();
  }
  const pad=8;
  spot.style.display='block';
  spot.style.left=Math.max(8,r.left-pad)+'px';
  spot.style.top=Math.max(8,r.top-pad)+'px';
  spot.style.width=Math.min(window.innerWidth-16,r.width+pad*2)+'px';
  spot.style.height=Math.min(window.innerHeight-16,r.height+pad*2)+'px';
}

  const exBySplit={};
  // Collect all exercises ever logged, grouped by which split they belong to
  S.workouts.forEach(function(w){
    const sp=w.split;
    w.exercises.forEach(function(ex){
      if(!exBySplit[sp])exBySplit[sp]=new Set();
      exBySplit[sp].add(ex.name);
    });
  });
  // Also include splitEx template exercises
  Object.keys(S.splitEx).forEach(function(sp){
    (S.splitEx[sp]||[]).forEach(function(n){
      if(!exBySplit[sp])exBySplit[sp]=new Set();
      exBySplit[sp].add(n);
    });
  });
  // Collect exercises not in any known split
  const allKnown=new Set(Object.values(exBySplit).flatMap(function(s){return [...s];}));
  const allLogged=[...new Set(S.workouts.flatMap(function(w){return w.exercises.map(function(e){return e.name;})}))];
  const other=allLogged.filter(function(n){return !allKnown.has(n);});

  const groups=[];
  splitOrder.forEach(function(sp){
    if(exBySplit[sp]&&exBySplit[sp].size){
      groups.push({label:spLbl(sp),col:spCol(sp),names:[...exBySplit[sp]]});
    }
  });
  if(other.length) groups.push({label:'Other',col:'var(--muted)',names:other});

  const picker=groups.map(function(g){
    return '<div style="margin-bottom:12px">'+
      '<div style="font-size:10px;font-weight:700;color:'+g.col+';letter-spacing:.08em;margin-bottom:6px">'+g.label.toUpperCase()+'</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:5px">'+
        g.names.map(function(n){
          const on=S.selEx===n;
          return '<button onclick="selEx(\''+n.replace(/'/g,"\\'")+'\')" style="background:'+(on?'var(--blue)':'var(--s1)')+';color:'+(on?'#fff':'var(--sub)')+';border:1px solid '+(on?'var(--blue)':'var(--border)')+';padding:5px 10px;border-radius:6px;font-size:10px;font-weight:'+(on?700:400)+';cursor:pointer;font-family:inherit">'+n+'</button>';
        }).join('')+
      '</div>'+
    '</div>';
  }).join('');

  if(!S.selEx) return picker;

  // ── Data for selected exercise ────────────────────────────
  const rows=S.workouts.filter(function(w){return w.exercises.find(function(e){return e.name===S.selEx;});}).map(function(w){
    const ex=w.exercises.find(function(e){return e.name===S.selEx;});
    const ws=ex.sets.filter(function(s){return !s.warmup;});
    if(!ws.length)return null;
    const best=ws.reduce(function(b,s){return e1rm(s.w,s.r)>e1rm(b.w,b.r)?s:b;},ws[0]);
    return{date:fmtD(w.date),val:Math.round(Math.max.apply(null,ws.map(function(s){return e1rm(s.w,s.r);}))*10)/10,tw:best.w,tr:best.r};
  }).filter(Boolean).reverse();

  if(!rows.length) return picker+'<div style="color:var(--muted);font-size:13px;text-align:center;margin-top:30px">No working sets logged for this exercise yet.</div>';

  const peak=Math.max.apply(null,rows.map(function(d){return d.val;}));
  const first=rows[0].val, latest=rows[rows.length-1].val;
  const totalGain=Math.round((latest-first)*10)/10;
  const sessions=rows.length;

  // Simple trend: last 3 vs previous 3
  const trend=(function(){
    if(rows.length<4)return null;
    const recent=rows.slice(-3).reduce(function(a,r){return a+r.val;},0)/3;
    const prev=rows.slice(-6,-3).reduce(function(a,r){return a+r.val;},0)/Math.max(rows.slice(-6,-3).length,1);
    const diff=Math.round((recent-prev)*10)/10;
    return{diff:diff,dir:diff>1?'up':diff<-1?'down':'flat'};
  })();

  // AI analysis section
  const analysisHtml=(function(){
    if(S.chartAnalysisEx===S.selEx&&S.chartAnalysis){
      return '<div style="background:var(--s1);border:1px solid rgba(26,158,212,.25);border-radius:12px;padding:14px;margin-bottom:18px">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
          '<div style="width:3px;height:14px;background:var(--blue);border-radius:2px"></div>'+
          '<span style="font-size:11px;font-weight:700;color:var(--blue);letter-spacing:.08em">COACH ANALYSIS</span>'+
        '</div>'+
        '<div style="font-size:13px;line-height:1.75;color:var(--white)">'+renderMd(S.chartAnalysis)+'</div>'+
      '</div>';
    }
    if(S.chartAnalysisLoading){
      return '<div style="background:var(--s1);border:1px solid rgba(26,158,212,.15);border-radius:12px;padding:14px;margin-bottom:18px;display:flex;align-items:center;gap:10px">'+
        '<div class="spinner" style="width:16px;height:16px;flex-shrink:0"></div>'+
        '<span style="font-size:12px;color:var(--muted)">Analyzing '+S.selEx+' progression...</span>'+
      '</div>';
    }
    return '<button onclick="requestChartAnalysis()" style="width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:12px;font-weight:700;color:var(--blue);cursor:pointer;font-family:inherit;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:6px">'+
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>'+
      'Analyze my '+S.selEx+' progress'+
    '</button>';
  })();

  const hist=rows.map(function(d){
    return '<div class="hist-row">'+
      '<span class="mono" style="font-size:11px;color:var(--muted)">'+d.date+'</span>'+
      '<span class="mono" style="font-size:11px">'+toDisp(d.tw)+' '+uLbl()+'&times;'+d.tr+'</span>'+
      '<span class="mono" style="font-size:11px;color:var(--blue)">e1RM '+toDisp(d.val)+'</span>'+
    '</div>';
  }).join('');

  return picker+
    // ── Stats row ──────────────────────────────────────
    '<div style="display:flex;gap:8px;margin-bottom:18px">'+
      '<div style="flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center">'+
        '<div class="mono" style="font-size:20px;font-weight:700;color:var(--blue)">'+toDisp(peak)+'</div>'+
        '<div style="font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.06em">PEAK e1RM</div>'+
      '</div>'+
      '<div style="flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center">'+
        '<div class="mono" style="font-size:20px;font-weight:700;color:'+(totalGain>=0?'#2DAA70':'#E05050')+'">'+(totalGain>=0?'+':'')+toDisp(totalGain)+'</div>'+
        '<div style="font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.06em">TOTAL GAIN</div>'+
      '</div>'+
      '<div style="flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center">'+
        (trend?
          '<div class="mono" style="font-size:20px;font-weight:700;color:'+(trend.dir==='up'?'#2DAA70':trend.dir==='down'?'#E05050':'var(--muted)')+'">'+
            (trend.dir==='up'?'↑':trend.dir==='down'?'↓':'→')+
          '</div>':
          '<div class="mono" style="font-size:20px;font-weight:700;color:var(--muted)">—</div>')+
        '<div style="font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.06em">RECENT TREND</div>'+
      '</div>'+
      '<div style="flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px;text-align:center">'+
        '<div class="mono" style="font-size:20px;font-weight:700;color:var(--white)">'+sessions+'</div>'+
        '<div style="font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.06em">SESSIONS</div>'+
      '</div>'+
    '</div>'+
    // ── Chart ──────────────────────────────────────────
    '<div class="tour-chart-target" style="height:160px;margin-bottom:18px"><canvas id="prog-chart"></canvas></div>'+
    // ── AI analysis ────────────────────────────────────
    analysisHtml+
    // ── History table ──────────────────────────────────
    '<span class="lbl" style="margin-bottom:8px">HISTORY</span>'+hist;
}

function drawChart(){
  if(S.progressTab!=='progress')return;
  const canvas=document.getElementById('prog-chart');if(!canvas)return;
  if(S.chart){S.chart.destroy();S.chart=null;}
  const rows=S.workouts.filter(function(w){return w.exercises.find(function(e){return e.name===S.selEx;});}).map(function(w){
    const ex=w.exercises.find(function(e){return e.name===S.selEx;});
    const ws=ex.sets.filter(function(s){return !s.warmup;});
    return ws.length?{date:fmtD(w.date),val:Math.max.apply(null,ws.map(function(s){return e1rm(s.w,s.r);}))}:null;
  }).filter(Boolean).reverse();
  if(!rows.length)return;
  S.chart=new Chart(canvas,{type:'line',
    data:{labels:rows.map(function(r){return r.date;}),datasets:[{data:rows.map(function(r){return r.val;}),borderColor:'#1A9ED4',backgroundColor:'rgba(26,158,212,0.08)',pointBackgroundColor:'#1A9ED4',pointRadius:4,tension:0.3,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#fff',borderColor:'#C8DCF0',borderWidth:1,titleColor:'#5A84A0',bodyColor:'#0D1E2E',callbacks:{label:function(ctx){return 'e1RM: '+ctx.raw+uLbl();}}}},scales:{x:{grid:{color:'#EBF3FA'},ticks:{color:'#9AB8CC',font:{size:9}}},y:{grid:{color:'#EBF3FA'},ticks:{color:'#9AB8CC',font:{size:9}}}}}
  });
}

function calNav(dir){
  S.calMonth+=dir;
  if(S.calMonth>11){S.calMonth=0;S.calYear++;}
  if(S.calMonth<0){S.calMonth=11;S.calYear--;}
  S.selWorkout=null;S.newPastDate=null;S.newPastSplit=null;render();
}
function promptPastWorkout(dateStr){
  S.newPastDate=dateStr;
  S.newPastSplit=null;
  render();
}
function createPastWorkout(){
  if(!S.newPastDate||!S.newPastSplit)return;
  const exs=(S.splitEx[S.newPastSplit]||[]).map(function(name){return{name:name,sets:[],inputW:'135',inputR:'8'};});
  const w={date:new Date(S.newPastDate+'T12:00:00').toISOString(),split:S.newPastSplit,exercises:exs};
  // Insert in chronological order
  const ts=new Date(w.date).getTime();
  let idx=S.workouts.findIndex(function(x){return new Date(x.date).getTime()<ts;});
  if(idx===-1)idx=S.workouts.length;
  S.workouts.splice(idx,0,w);
  persist('ll_workouts',S.workouts);
  S.newPastDate=null;S.newPastSplit=null;
  S.selWorkout=idx;S.editPastMode=true;
  go('workout-detail');
}
function selCalWorkout(idx){
  S.selWorkout=idx;
  S.editPastMode=false;
  S.editPastExIdx=null;
  S.editPastSetIdx=null;
  go('workout-detail');
}

// ── PAST WORKOUT EDITING ──────────────────────────────────────
function pastSave(){persist('ll_workouts',S.workouts);}

function savePastDate(val){
  if(!val||S.selWorkout===null)return;
  // Keep original time, just change date
  const orig=new Date(S.workouts[S.selWorkout].date);
  const nd=new Date(val+'T'+orig.toTimeString().slice(0,8));
  S.workouts[S.selWorkout].date=nd.toISOString();
  pastSave();render();
}

function deleteWorkout(){
  if(!confirm('Delete this workout permanently?'))return;
  S.workouts.splice(S.selWorkout,1);
  persist('ll_workouts',S.workouts);
  S.selWorkout=null;S.editPastMode=false;
  go('progress');
}

function savePastSet(ei,si){
  const w=S.workouts[S.selWorkout];
  const s=w.exercises[ei].sets[si];
  const isCardio=isCardioEx(w.exercises[ei].name);
  const wi=document.getElementById('psi-w-'+ei+'-'+si);
  const ri=document.getElementById('psi-r-'+ei+'-'+si);
  if(wi)s.w=isCardio?parseFloat(wi.value):toKg(parseFloat(wi.value)||0);
  if(ri&&!isCardio)s.r=parseInt(ri.value)||0;
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function deletePastSet(ei,si){
  S.workouts[S.selWorkout].exercises[ei].sets.splice(si,1);
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function togglePastWarmup(ei,si){
  const s=S.workouts[S.selWorkout].exercises[ei].sets[si];
  s.warmup=!s.warmup;
  pastSave();render();
}
function addPastSet(ei){
  const w=S.workouts[S.selWorkout];
  const ex=w.exercises[ei];
  const isCardio=isCardioEx(ex.name);
  const wi=document.getElementById('new-w-'+ei);
  const ri=document.getElementById('new-r-'+ei);
  const dW=parseFloat(wi?wi.value:0)||0;
  const r=parseInt(ri?ri.value:0)||0;
  if(!dW)return;
  ex.sets.push({w:isCardio?dW:toKg(dW),r:isCardio?0:r});
  S.editPastAddingEx=null;
  pastSave();render();
}
function deletePastExercise(ei){
  S.workouts[S.selWorkout].exercises.splice(ei,1);
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function savePastExName(ei){
  const inp=document.getElementById('past-ex-name-'+ei);
  const name=inp?inp.value.trim():'';
  if(!name)return;
  S.workouts[S.selWorkout].exercises[ei].name=name;
  S.editPastExIdx=null;
  pastSave();render();
}
function addPastExercise(){
  const inp=document.getElementById('past-new-ex');
  const name=inp?inp.value.trim():'';
  if(!name)return;
  S.workouts[S.selWorkout].exercises.push({name:name,sets:[],inputW:'135',inputR:'8'});
  if(inp)inp.value='';
  pastSave();render();
}
function nudgePastW(ei,si,delta){
  const inp=document.getElementById('psi-w-'+ei+'-'+si);
  if(!inp)return;
  inp.value=Math.max(0,Math.round(((parseFloat(inp.value)||0)+delta)*10)/10);
}
function nudgePastR(ei,si,delta){
  const inp=document.getElementById('psi-r-'+ei+'-'+si);
  if(!inp)return;
  inp.value=Math.max(1,(parseInt(inp.value)||0)+delta);
}
function nudgePastNewW(ei,delta){
  const inp=document.getElementById('new-w-'+ei);
  if(!inp)return;
  inp.value=Math.max(0,Math.round(((parseFloat(inp.value)||0)+delta)*10)/10);
}
function nudgePastNewR(ei,delta){
  const inp=document.getElementById('new-r-'+ei);
  if(!inp)return;
  inp.value=Math.max(1,(parseInt(inp.value)||0)+delta);
}

  const totalSets=w.exercises.reduce(function(acc,e){return acc+e.sets.filter(function(s){return !s.warmup;}).length;},0);

              (s.warmup?'WU on':'Mark WU')+

function updateProfile(field, val){

}

}

function actionLbl(a){
  if(a.type==='update_schedule')return 'Schedule updated';
  if(a.type==='update_split_exercises')return (SPLIT_LBL[a.split]||a.split)+' updated';
  if(a.type==='add_exercise')return 'Added '+a.exercise;
  if(a.type==='remove_exercise')return 'Removed '+a.exercise;
  if(a.type==='workout_swap_exercise')return 'Swapped '+a.from+' for '+a.to;
  if(a.type==='workout_add_exercise')return 'Added '+a.exercise;
  if(a.type==='workout_remove_exercise')return 'Removed '+a.exercise;
  if(a.type==='log_set')return 'Set logged';
  return a.type;
}

function buildFBtns(actions){
  if(!actions||!actions.length)return '';
  const types=actions.map(function(a){return a.type;});
  const btns=[];
  const workoutRelated=types.some(function(t){return['update_split_exercises','add_exercise','remove_exercise','workout_add_exercise','workout_remove_exercise','workout_swap_exercise'].includes(t);});
  if(workoutRelated){
    const today=todayKey();const sp=S.schedule[today];
    if(sp!=='rest')btns.push('<button class="fol-btn ac" onclick="startWorkout(\''+sp+'\')">Start today\'s '+spLbl(sp)+' &rarr;</button>');
  }
  if(types.includes('update_schedule'))btns.push('<button class="fol-btn" onclick="navTo(\'setup\')">View schedule</button>');
  if(types.includes('log_set')&&S.workout)btns.push('<button class="fol-btn ac" onclick="go(\'log\')">Back to workout &rarr;</button>');
  return btns.length?'<div class="follow-btns">'+btns.join('')+'</div>':'';
}

function getQuickCmds(){
  const today=todayKey();
  const sp=S.schedule[today];
  const isRest=!sp||sp==='rest';

  // ── Active workout ────────────────────────────────────────
  if(S.workout&&!S.workout.templateOnly){
    const w=S.workout;
    const exs=w.exercises;
    const logged=exs.filter(function(e){return e.sets.filter(function(s){return !s.warmup;}).length>0;});
    const notLogged=exs.filter(function(e){return e.sets.filter(function(s){return !s.warmup;}).length===0;});
    const lastLogged=logged.length?logged[logged.length-1]:null;
    const nextUp=notLogged.length?notLogged[0]:null;
    const cmds=[];
    if(nextUp) cmds.push('What weight should I use for '+nextUp.name+'?');
    if(lastLogged) cmds.push('How did my '+lastLogged.name+' look?');
    if(logged.length===exs.length) cmds.push('Am I ready to finish?');
    else cmds.push('How many sets left should I do?');
    if(nextUp) cmds.push('Swap '+nextUp.name+' for something else');
    return cmds.slice(0,4);
  }

  // ── Rest day ──────────────────────────────────────────────
  if(isRest){
    const tomorrow=DAYS[(DAYS.indexOf(today)+1)%7];
    const tomorrowSp=S.schedule[tomorrow];
    const cmds=['What should I prioritize next session?','How is my recovery looking this week?'];
    if(tomorrowSp&&tomorrowSp!=='rest') cmds.push('What weight should I target for '+spLbl(tomorrowSp)+'?');
    cmds.push('Show me my weakest lift');
    return cmds.slice(0,4);
  }

  // ── Training day, no active workout ──────────────────────
  const todayExs=S.splitEx[sp]||[];
  const cmds=[];
  // Reference last session for this split
  const lastSplit=S.workouts.find(function(w){return w.split===sp;});
  if(lastSplit){
    const daysSince=Math.round((Date.now()-new Date(lastSplit.date).getTime())/86400000);
    cmds.push('How did my last '+spLbl(sp)+' go? ('+daysSince+'d ago)');
  }
  if(todayExs.length) cmds.push('What weight should I use for '+todayExs[0]+'?');
  if(todayExs.length>1) cmds.push('Any changes to today\'s '+spLbl(sp)+' session?');
  // Add a progress chip for main lifts
  const mainLifts=['Bench Press','Squat','Deadlift','Overhead Press','Pull-Ups'];
  const tracked=mainLifts.find(function(l){return S.workouts.some(function(w){return w.exercises.find(function(e){return e.name===l;});});});
  if(tracked) cmds.push('How is my '+tracked+' progressing?');
  return cmds.slice(0,4);
}

const ACTION_SPLITS=['push','pull','legs','upper','lower','rest','cardio','hiit','core','arms'];
function splitFromText(text){
  const t=' '+String(text||'').toLowerCase().replace(/[^a-z0-9\s]/g,' ')+' ';
  for(const sp of ACTION_SPLITS){if(t.indexOf(' '+sp+' ')>=0)return sp;}
  return null;
}
function capSplit(sp){return spLbl(sp||'').replace(/\b\w/g,function(c){return c.toUpperCase();});}

function logCardioFromAI(minutes,exercise){
  const mins=Math.max(1,parseInt(minutes,10)||0);

}
function executePendingAction(text){
  if(!S.pendingAction)return null;
  const t=String(text||'').trim().toLowerCase();
  if(/^(no|nope|cancel|stop|never mind|nevermind|don'?t)$/i.test(t)){
    S.pendingAction=null;
    persistAll();
    render();
    return 'No problem.';
  }
  const yes=/^(yes|yeah|yep|sure|ok|okay|do it|confirm|please|go ahead|start it|log it)$/i.test(t);
  if(!yes)return null;
  const pending=S.pendingAction;
  S.pendingAction=null;
  if(pending.type==='start_workout')return startWorkoutFromAI(pending.split);
  if(pending.type==='log_empty_workout'){
    if(/\bstart\b|\bstart it\b|\bbegin\b/.test(t))return startWorkoutFromAI(pending.split);
    return logEmptyWorkoutFromAI(pending.split,pending.date);
  }
  persistAll();
  render();
  return null;
}
function cardioIntent(text){
  const t=String(text||'').toLowerCase();
  const m=t.match(/\b(\d{1,3})\s*(minutes?|mins?|min)\b/);
  if(!m)return null;
  const hasCardio=/\b(walked|walking|walk|cardio|cycling|cycle|biking|bike|running|run|jogging|jog|elliptical|rower|rowing)\b/.test(t);
  const hasLog=/\b(log|logged|did|completed|mark)\b/.test(t);
  if(!hasCardio||!hasLog)return null;
  let ex='Cardio Session';
  if(/\bwalked|walking|walk\b/.test(t))ex='Walking';
  else if(/\bcycling|cycle|biking|bike\b/.test(t))ex='Cycling';
  else if(/\brunning|run\b/.test(t))ex='Running';
  else if(/\bjogging|jog\b/.test(t))ex='Jogging';
  else if(/\belliptical\b/.test(t))ex='Elliptical';
  else if(/\brower|rowing\b/.test(t))ex='Rowing';
  return{minutes:parseInt(m[1],10),exercise:ex};
}
function handleUserActionIntent(text){
  const pendingReply=executePendingAction(text);
  if(pendingReply)return pendingReply;
  const cardio=cardioIntent(text);
  if(cardio)return logCardioFromAI(cardio.minutes,cardio.exercise);
  const t=String(text||'').toLowerCase().trim();
  const split=splitFromText(t);
  if(!split||split==='rest')return null;
  const explicitStart=/\b(start|begin|let'?s do|lets do|train)\b/.test(t);
  const softStart=/\b(i want to do|want to do|do .* today|today)\b/.test(t)&&!/\b(log|logged|did|completed|mark)\b/.test(t);
  const logDone=/\b(log|logged|i did|did|completed|complete|mark)\b/.test(t)&&/\b(workout|session|today|done|log|logged|completed|complete|did|mark)\b/.test(t);
  if(explicitStart||softStart){
    const scheduled=S.schedule[todayKey()];
    if(softStart&&scheduled&&scheduled!==split){
      S.pendingAction={type:'start_workout',split:split};
      persistAll();
      render();
      return 'Today is scheduled as '+capSplit(scheduled)+'. Do you want me to start a '+capSplit(split)+' session instead?';
    }
    return startWorkoutFromAI(split);
  }
  if(logDone){
    S.pendingAction={type:'log_empty_workout',split:split,date:todayIso()};
    persistAll();
    render();
    return 'Do you want me to log a completed '+capSplit(split)+' session for today without set details, or start a '+capSplit(split)+' workout now?';
  }
  return null;
}
