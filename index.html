const DAYS=['mon','tue','wed','thu','fri','sat','sun'];
const DAY_FULL={mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday',sun:'Sunday'};
const SPLITS=['push','pull','legs','upper','lower','rest'];
const SPLIT_LBL={push:'Push',pull:'Pull',legs:'Legs',upper:'Upper',lower:'Lower',rest:'Rest'};
const SPLIT_COL={push:'#E8693A',pull:'#1A9ED4',legs:'#2DAA70',upper:'#7B6FE0',lower:'#D4A020',rest:'#9AB8CC'};
const CUSTOM_COLS=['#E84393','#00BFA5','#FF6F00','#5C6BC0','#26A69A','#EF5350','#8D6E63','#42A5F5'];
function spLbl(sp){return SPLIT_LBL[sp]||(sp?sp.charAt(0).toUpperCase()+sp.slice(1):'?');}
function spCol(sp){
  if(SPLIT_COL[sp])return SPLIT_COL[sp];
  let h=0;for(let i=0;i<sp.length;i++)h=(h*31+sp.charCodeAt(i))&0xffffffff;
  return CUSTOM_COLS[Math.abs(h)%CUSTOM_COLS.length];
}
function cleanSplit(s){return String(s||'').trim().toLowerCase();}
function normalizeSplitsData(){
  // Merge old saved split names like "Push"/"Pull" into canonical lowercase keys
  const merged={};
  Object.keys(S.splitEx||{}).forEach(function(k){
    const ck=cleanSplit(k);
    if(!ck)return;
    merged[ck]=[...new Set([...(merged[ck]||[]),...((S.splitEx||{})[k]||[])])];
  });
  S.splitEx=Object.assign({},JSON.parse(JSON.stringify(DEF_EX)),merged);
  Object.keys(S.schedule||{}).forEach(function(d){S.schedule[d]=cleanSplit(S.schedule[d]);});
}
function allSplits(){
  const inSched=Object.values(S.schedule||{}).map(cleanSplit);
  const inEx=Object.keys(S.splitEx||{}).map(cleanSplit);
  return[...new Set([...SPLITS.map(cleanSplit),...inSched,...inEx])].filter(Boolean);
}

var _sheetDrag={el:null,startY:0,dy:0,active:false};
function sheetTouchStart(e){
  if(!e.touches||!e.touches.length)return;
  _sheetDrag={el:e.currentTarget,startY:e.touches[0].clientY,dy:0,active:false};
}
function sheetTouchMove(e){
  if(!_sheetDrag.el||!e.touches||!e.touches.length)return;
  const sc=_sheetDrag.el.querySelector('[data-sheet-scroll]');
  const atTop=!sc||sc.scrollTop<=0;
  const dy=e.touches[0].clientY-_sheetDrag.startY;
  _sheetDrag.dy=dy;
  if(dy>0&&atTop){
    _sheetDrag.active=true;
    _sheetDrag.el.style.transition='none';
    _sheetDrag.el.style.transform='translateY('+Math.min(dy,180)+'px)';
    e.preventDefault();
  }
}
function sheetTouchEnd(kind){
  const d=_sheetDrag;
  if(!d.el)return;
  if(d.active&&d.dy>90){
    closeSheet(kind);
  }else{
    d.el.style.transition='transform .18s ease';
    d.el.style.transform='translateY(0)';
  }
  _sheetDrag={el:null,startY:0,dy:0,active:false};
}
function closeSheet(kind){
  if(kind==='dayPreview')S.dayPreviewPanel=null;
  else if(kind==='exHistory')S.exHistoryPanel=null;
  else if(kind==='exInstruct'){S.exInstructPanel=null;S.exInstructText=null;S.exInstructChat=[];}
  else if(kind==='scoreDetail')S.scoreDetail=null;
  render();
}

// Returns all working sets from the most recent session for an exercise
// Compute overload suggestion: returns {dir:'up'|'down', weight (kg), weightDisp, reason, detail} or null
// ── PLATE CALCULATOR ─────────────────────────────────────────
const BARBELL_EX=['squat','deadlift','bench press','overhead press','barbell row','romanian deadlift','good morning','front squat','sumo deadlift','hip thrust','pendlay row','yates row','seal row'];
function isBarbell(exName){
  const n=(exName||'').toLowerCase();
  return BARBELL_EX.some(function(k){return n.includes(k);});
}
function calcPlates(totalLbs){
  const barWeight=45;
  const available=[45,35,25,10,5,2.5];
  let remaining=Math.max(0,(totalLbs-barWeight)/2);
  const result=[];
  available.forEach(function(p){
    const count=Math.floor(remaining/p+0.01); // +0.01 for float tolerance
    if(count>0){result.push({p:p,n:count});remaining=Math.round((remaining-p*count)*100)/100;}
  });
  return result;
}

function flushLogInputs(){
  if(!S.workout)return;
  S.workout.exercises.forEach((ex,i)=>{
    const wi=document.getElementById('w'+i);
    const ri=document.getElementById('r'+i);
    if(wi)ex.inputW=wi.value;
    if(ri)ex.inputR=ri.value;

}

// ── VIEWS ─────────────────────────────────────────────────────
function vHome(){
  const today=todayKey();
  const sp=S.schedule[today];
  const col=spCol(sp);
  // Show active workout exercises if it's today's split, otherwise show template
  const exs=(S.workout&&S.workout.split===sp)
    ? S.workout.exercises.map(function(e){return e.name;})
    : (S.splitEx[sp]||[]);
  const isRest=sp==='rest';

  // Stats — include active workout in "this week" if it has sets
  const activeHasSets=S.workout&&S.workout.exercises.some(function(e){return e.sets.length>0;});
  const totalSessions=S.workouts.length+(activeHasSets?1:0);
  const thisWeekDays=['mon','tue','wed','thu','fri','sat','sun'];
  const oneWeekAgo=Date.now()-7*24*60*60*1000;
  const thisWeekCount=S.workouts.filter(function(w){return new Date(w.date).getTime()>oneWeekAgo;}).length+(activeHasSets?1:0);
  const plannedThisWeek=thisWeekDays.filter(function(d){return S.schedule[d]!=='rest';}).length;

  // Streak

// ── PAST WORKOUT EDITING ──────────────────────────────────────
function pastSave(){persist('ll_workouts',S.workouts);}

function savePastDate(val){
  if(!val||S.selWorkout===null)return;
  // Keep original time, just change date
  const orig=new Date(S.workouts[S.selWorkout].date);
  const nd=new Date(val+'T'+orig.toTimeString().slice(0,8));
  S.workouts[S.selWorkout].date=nd.toISOString();
  pastSave();render();
}

function deleteWorkout(){
  if(!confirm('Delete this workout permanently?'))return;
  S.workouts.splice(S.selWorkout,1);
  persist('ll_workouts',S.workouts);
  S.selWorkout=null;S.editPastMode=false;
  go('progress');
}

function savePastSet(ei,si){
  const w=S.workouts[S.selWorkout];
  const s=w.exercises[ei].sets[si];
  const isCardio=isCardioEx(w.exercises[ei].name);
  const wi=document.getElementById('psi-w-'+ei+'-'+si);
  const ri=document.getElementById('psi-r-'+ei+'-'+si);
  if(wi)s.w=isCardio?parseFloat(wi.value):toKg(parseFloat(wi.value)||0);
  if(ri&&!isCardio)s.r=parseInt(ri.value)||0;
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function deletePastSet(ei,si){
  S.workouts[S.selWorkout].exercises[ei].sets.splice(si,1);
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function togglePastWarmup(ei,si){
  const s=S.workouts[S.selWorkout].exercises[ei].sets[si];
  s.warmup=!s.warmup;
  pastSave();render();
}
function addPastSet(ei){
  const w=S.workouts[S.selWorkout];
  const ex=w.exercises[ei];
  const isCardio=isCardioEx(ex.name);
  const wi=document.getElementById('new-w-'+ei);
  const ri=document.getElementById('new-r-'+ei);
  const dW=parseFloat(wi?wi.value:0)||0;
  const r=parseInt(ri?ri.value:0)||0;
  if(!dW)return;
  ex.sets.push({w:isCardio?dW:toKg(dW),r:isCardio?0:r});
  S.editPastAddingEx=null;
  pastSave();render();
}
function deletePastExercise(ei){
  S.workouts[S.selWorkout].exercises.splice(ei,1);
  S.editPastExIdx=null;S.editPastSetIdx=null;
  pastSave();render();
}
function savePastExName(ei){
  const inp=document.getElementById('past-ex-name-'+ei);
  const name=inp?inp.value.trim():'';
  if(!name)return;
  S.workouts[S.selWorkout].exercises[ei].name=name;
  S.editPastExIdx=null;
  pastSave();render();
}
function addPastExercise(){
  const inp=document.getElementById('past-new-ex');
  const name=inp?inp.value.trim():'';
  if(!name)return;
  S.workouts[S.selWorkout].exercises.push({name:name,sets:[],inputW:'135',inputR:'8'});
  if(inp)inp.value='';
  pastSave();render();
}
function nudgePastW(ei,si,delta){
  const inp=document.getElementById('psi-w-'+ei+'-'+si);
  if(!inp)return;
  inp.value=Math.max(0,Math.round(((parseFloat(inp.value)||0)+delta)*10)/10);
}
function nudgePastR(ei,si,delta){
  const inp=document.getElementById('psi-r-'+ei+'-'+si);
  if(!inp)return;
  inp.value=Math.max(1,(parseInt(inp.value)||0)+delta);
}
function nudgePastNewW(ei,delta){
  const inp=document.getElementById('new-w-'+ei);
  if(!inp)return;
  inp.value=Math.max(0,Math.round(((parseFloat(inp.value)||0)+delta)*10)/10);
}
function nudgePastNewR(ei,delta){
  const inp=document.getElementById('new-r-'+ei);
  if(!inp)return;
  inp.value=Math.max(1,(parseInt(inp.value)||0)+delta);
}

  const totalSets=w.exercises.reduce(function(acc,e){return acc+e.sets.filter(function(s){return !s.warmup;}).length;},0);
  const totalVol=w.exercises.reduce(function(acc,e){return acc+e.sets.filter(function(s){return !s.warmup&&!isCardioEx(e.name);}).reduce(function(a,s){return a+s.w*s.r;},0);},0);

          '<button onclick="savePastExName('+ei+')" style="flex:2;background:var(--blue);color:#fff;border:none;border-radius:7px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Save</button>'+

          '<button onclick="deleteWorkout()" style="background:#FEE8E8;border:1px solid #FCC;color:#C44;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">'+
            '&#128465; Delete'+
          '</button>':'')+ 
      '</div>'+
    '</div>'+
    '<div style="display:flex;gap:16px">'+
      '<div><div class="mono" style="font-size:20px;font-weight:800;color:var(--white)">'+w.exercises.filter(function(e){return e.sets.length>0;}).length+'</div><div style="font-size:10px;color:var(--muted)">exercises</div></div>'+
      '<div><div class="mono" style="font-size:20px;font-weight:800;color:var(--white)">'+totalSets+'</div><div style="font-size:10px;color:var(--muted)">working sets</div></div>'+
      (totalVol>0?'<div><div class="mono" style="font-size:20px;font-weight:800;color:var(--blue)">'+Math.round(toDisp(totalVol)).toLocaleString()+'</div><div style="font-size:10px;color:var(--muted)">vol ('+uLbl()+')</div></div>':'')+
    '</div>'+
  '</div>'+
  (edit?'<div style="font-size:11px;color:var(--blue);margin:-6px 0 14px;font-weight:600">Tap any set to edit &middot; + Add Set at bottom of each exercise</div>':'')+
  exCards+addExPanel+
  // ── Debrief (if saved with this workout) ──────────────────
  (w.debrief?
    '<div style="background:var(--s1);border:1px solid rgba(26,158,212,.25);border-radius:12px;padding:14px;margin-top:6px">'+

        '<div style="width:3px;height:14px;background:var(--blue);border-radius:2px"></div>'+

      '</div>'+
      '<div style="font-size:13px;line-height:1.75;color:var(--white)">'+renderMd(w.debrief)+'</div>'+

  );

function _selPref(field,val,label){
  const on=S.profile[field]===val||S.profile[field]===String(val);
  const valJs=typeof val==='number'?val:'\''+val+'\'';
  return '<button onclick="updateProfile(\''+field+'\','+valJs+')" style="background:'+(on?'var(--blue)':'var(--s1)')+';color:'+(on?'#fff':'var(--sub)')+';border:1px solid '+(on?'var(--blue)':'var(--border)')+';border-radius:8px;padding:7px 12px;font-size:11px;font-weight:'+(on?700:500)+';cursor:pointer;font-family:inherit">'+label+'</button>';
}

function vProfile(){
  const p=S.profile;

  const aiSetupBtn='<button onclick="startOnboarding()" style="width:100%;background:var(--white);color:#fff;border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px">'+
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1A9ED4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>'+
    '<span>Set up with AI <span style="color:var(--blue)">→</span></span>'+

  function field(label, key, placeholder, hint){

        'oninput="saveProfileSilent(\''+key+'\',this.value)" '+

        'style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--white);outline:none;font-family:inherit">'+
    '</div>';
  }
  function area(label, key, placeholder, hint){
    const val=escH(String(p[key]||''));
    return '<div class="card" style="margin-bottom:10px">'+
      '<span class="lbl" style="margin-bottom:6px">'+label+'</span>'+
      (hint?'<div style="font-size:10px;color:var(--muted);margin-bottom:8px;line-height:1.4">'+hint+'</div>':'')+
      '<textarea oninput="saveProfileSilent(\''+key+'\',this.value)" '+
        'onblur="updateProfile(\''+key+'\',this.value)" '+
        'placeholder="'+placeholder+'" '+
        'style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--white);outline:none;font-family:inherit;resize:none;min-height:72px;line-height:1.5">'+
        val+
      '</textarea>'+
    '</div>';
  }

  return '<div>'+
    aiSetupBtn+

    // Bodyweight + height on one row
    '<div style="display:flex;gap:8px;margin-bottom:10px">'+
      '<div class="card" style="flex:1;margin-bottom:0">'+
        '<span class="lbl" style="margin-bottom:6px">BODYWEIGHT</span>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<input value="'+escH(String(p.bodyweight||''))+'" placeholder="e.g. 175" type="number" '+
            'oninput="saveProfileSilent(\'bodyweight\',this.value)" '+
            'onblur="updateProfile(\'bodyweight\',this.value)" '+
            'style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--white);outline:none;font-family:inherit;min-width:0">'+
          '<span style="font-size:11px;color:var(--muted);flex-shrink:0">'+uLbl()+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="card" style="flex:1;margin-bottom:0">'+
        '<span class="lbl" style="margin-bottom:6px">HEIGHT</span>'+
        '<input value="'+escH(String(p.height||''))+'" placeholder="e.g. 5\'11&quot; or 180cm" '+

          'style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--white);outline:none;font-family:inherit">'+

      'Be as specific as you want. The AI uses this to tailor recommendations.')+
    area('EXPERIENCE &amp; BACKGROUND','experience',
      'e.g. 2 years lifting, comfortable with barbell movements, new to pull-ups...',
      'Your lifting history helps the AI calibrate difficulty.')+
    field('SESSION LENGTH','session_duration',
      'e.g. 60 minutes, 45-60 min, up to 90 min',
      '')+
    field('EXERCISES PER SESSION','exercises_per_session',
      'e.g. 5, around 6, 4-5 compounds',
      '')+
    area('EQUIPMENT','equipment',

      '')+
    area('INJURIES &amp; LIMITATIONS','injuries',
      'e.g. Bad lower back — avoid heavy deadlifts, left shoulder impingement...',
      'The AI will avoid exercises that aggravate these and suggest alternatives.')+
    area('OTHER PREFERENCES','preferences',
      'e.g. I hate cardio, I prefer mornings, I like supersets, no Olympic lifts...',
      'Anything else the AI should know about how you like to train.')+
    '<div style="background:var(--s2);border-radius:10px;padding:12px;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">'+
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'+

function updateProfile(field, val){
  S.profile[field]=val;
  persist('ll_profile', S.profile);
  render();
}
// Save profile field without triggering a full re-render — used by oninput
// so the keyboard doesn't dismiss on every keystroke
function saveProfileSilent(field, val){
  S.profile[field]=val;
  persist('ll_profile', S.profile);
}

function vSetup(){
  const tabs=['schedule','exercises','profile'].map(function(t){
    return '<button class="stab'+(S.setupTab===t?' on':'')+'" onclick="setSetupTab(\''+t+'\')">'+t.toUpperCase()+'</button>';
  }).join('');

  let body='';
  if(S.setupTab==='profile') body=vProfile();
  else if(S.setupTab==='schedule'){
    const rows=DAYS.map(function(d){
      const sp=S.schedule[d];const isT=d===todayKey();
      const btns=allSplits().map(function(s){
        const col=spCol(s);const on=sp===s;
        return '<button class="tag" onclick="setDay(\''+d+'\',\''+s+'\')" style="background:'+(on?hexA(col,.12):'none')+';border:1px solid '+(on?col:'var(--border)')+';color:'+(on?col:'var(--sub)')+';font-weight:'+(on?700:400)+';margin-bottom:3px">'+spLbl(s)+'</button>';
      }).join('');
      return '<div class="card" style="margin-bottom:7px">'+
        '<span class="lbl" style="color:'+(isT?'var(--white)':'var(--sub)')+';font-weight:'+(isT?700:400)+'">'+DAY_FULL[d].toUpperCase()+(isT?' <em style="color:var(--blue);font-style:normal">&larr; TODAY</em>':'')+'</span>'+

        '<div style="display:flex;gap:5px">'+
          '<input id="custom-'+d+'" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--white);outline:none;font-family:inherit" placeholder="Custom type (e.g. cardio, hiit, core...)" onkeydown="if(event.key===\'Enter\')setCustomDay(\''+d+'\')">'+
          '<button onclick="setCustomDay(\''+d+'\')" style="background:var(--blue);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700">Set</button>'+

      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--dim)">'+
        '<span style="font-size:13px;color:var(--white)">'+ex+'</span>'+
        '<button style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer" onclick="removeSplitEx(\''+S.editSplit+'\','+i+')">&#215;</button>'+
      '</div>';
    }).join('');
    body='<span class="lbl" style="margin-bottom:12px">EXERCISES PER SPLIT</span>'+
      '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">'+splitBtns+'</div>'+
      '<div style="margin-bottom:12px">'+(exList||'<div style="color:var(--muted);font-size:12px;padding:8px 0">No exercises yet.</div>')+'</div>'+
      '<div style="display:flex;gap:6px">'+
        '<input id="nex" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--white);outline:none;font-family:inherit" placeholder="Add exercise&hellip;" onkeydown="if(event.key===\'Enter\')addSplitEx()">'+
        '<button onclick="addSplitEx()" style="background:var(--blue);color:#fff;border-radius:6px;padding:9px 14px;font-weight:800;font-size:11px;cursor:pointer;font-family:inherit;border:none">ADD</button>'+
      '</div>';

    '<div style="display:flex;background:var(--bg);border:1px solid var(--border);border-radius:9px;overflow:hidden">'+
      '<button onclick="setUnit(\'kg\')" style="flex:1;padding:11px;font-size:13px;font-weight:'+(isKg?800:400)+';background:'+(isKg?'var(--blue)':'none')+';color:'+(isKg?'#fff':'var(--sub)')+';border:none;cursor:pointer;font-family:inherit">kg</button>'+
      '<button onclick="setUnit(\'lbs\')" style="flex:1;padding:11px;font-size:13px;font-weight:'+(!isKg?800:400)+';background:'+(!isKg?'var(--blue)':'none')+';color:'+(!isKg?'#fff':'var(--sub)')+';border:none;border-left:1px solid var(--border);cursor:pointer;font-family:inherit">lbs</button>'+
    '</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-top:8px">'+(isKg?'Showing weights in kilograms':'Showing weights in pounds &mdash; stored as kg')+'</div>'+
  '</div>';

  const apiCard='<div class="card" style="margin-top:14px">'+
    '<span class="lbl" style="margin-bottom:8px">AI API Key</span>'+
    '<div style="font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:9px">Stored only in this browser. It is not included in backups.</div>'+
    '<input id="setup-api-key-input" type="password" placeholder="'+(hasKey()?'API key saved':'Paste your API key')+'" onkeydown="if(event.key===\'Enter\')saveKey(\'setup-api-key-input\')" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12px;color:var(--white);outline:none;font-family:\'Courier New\',monospace;margin-bottom:8px">'+
    '<div style="display:flex;gap:8px;align-items:center">'+
      '<button onclick="saveKey(\'setup-api-key-input\')" style="flex:1;background:var(--blue);border:none;color:#fff;border-radius:8px;padding:9px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Save AI API Key</button>'+
      '<button onclick="clearApiKey()" style="background:none;border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:9px 12px;font-size:11px;cursor:pointer;font-family:inherit">Clear API Key</button>'+
    '</div>'+
    '<div id="key-err" style="color:#E05050;font-size:11px;margin-top:7px;min-height:14px"></div>'+
  '</div>';

  const tourCard='<div class="card" style="margin-top:14px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px">'+
      '<div>'+
        '<div style="font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px">Feature Tour</div>'+
        '<div style="font-size:11px;color:var(--muted);line-height:1.4">Preview Forma with temporary demo data.</div>'+
      '</div>'+
      '<button onclick="replayFeatureTour()" style="background:var(--s2);border:1px solid var(--border2);color:var(--blue);border-radius:9px;padding:9px 12px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap">Replay feature tour</button>'+
    '</div>'+
  '</div>';

  const backupCard=
    '<div class="card" style="margin-top:14px">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
        '<div style="width:36px;height:36px;background:var(--s2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
          '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'+
        '</div>'+
        '<div>'+
          '<div style="font-size:13px;font-weight:700;color:var(--white);margin-bottom:2px">Data Backup</div>'+
          '<div style="font-size:11px;color:var(--muted);line-height:1.4">Includes workouts, schedule, exercises, profile &amp; personalization</div>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;gap:8px;margin-bottom:6px">'+
        '<button onclick="exportData()" style="flex:1;background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Export</button>'+
        '<button onclick="document.getElementById(\'import-file\').click()" style="flex:1;background:var(--s1);color:var(--white);border:1px solid var(--border);border-radius:10px;padding:11px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Import</button>'+
      '</div>'+
      '<input id="import-file" type="file" accept=".json" style="display:none" onchange="importData(this)">'+
      '<div id="import-status" style="font-size:11px;min-height:14px;color:var(--blue)"></div>'+
    '</div>';

  const dangerCard=
    '<div class="card" style="margin-top:14px;border:1px solid #FCCECE">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">'+
        '<div style="width:36px;height:36px;background:#FEE8E8;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C44" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>'+
        '</div>'+
        '<div>'+
          '<div style="font-size:13px;font-weight:700;color:#C44;margin-bottom:2px">Delete All Data</div>'+

      '</div>'+

  return '<div class="stabs">'+tabs+'</div>'+body+unitCard+apiCard+tourCard+backupCard+dangerCard;

// Progress
function selEx(name){
  if(S.chartAnalysisEx!==name){S.chartAnalysis=null;S.chartAnalysisLoading=false;}
  S.selEx=name;render();setTimeout(drawChart,0);
}



// Setup
function setDay(day,sp){S.schedule[day]=sp;persist('ll_schedule',S.schedule);render();}
function setCustomDay(day){
  const inp=document.getElementById('custom-'+day);
  const val=inp?inp.value.trim().toLowerCase().replace(/\s+/g,'-'):'';
  if(!val)return;
  if(!S.splitEx[val]){S.splitEx[val]=DEF_EX[val]||[];persist('ll_splits',S.splitEx);}
  S.schedule[day]=val;persist('ll_schedule',S.schedule);render();
}
function setSetupTab(t){S.setupTab=t;render();}
function setEditSplit(s){S.editSplit=s;render();}
function addSplitEx(){
  const inp=document.getElementById('nex');if(!inp||!inp.value.trim())return;
  if(!S.splitEx[S.editSplit])S.splitEx[S.editSplit]=[];
  S.splitEx[S.editSplit].push(inp.value.trim());
  persist('ll_splits',S.splitEx);render();
}
function removeSplitEx(split,idx){S.splitEx[split].splice(idx,1);persist('ll_splits',S.splitEx);render();}
function setUnit(u){
  S.unit=u;persist('ll_unit',u);
  if(S.workout)S.workout.exercises.forEach(function(ex){ex.inputW=getLastW(ex.name);});
  render();
}
